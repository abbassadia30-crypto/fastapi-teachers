<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verifying Identity | InstitutionManager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS in Head as per instructions */
        :root {
            --primary: #43a047;
            --secondary: #263238;
            --bg: #ffffff;
            --danger: #e53935;
            --warning: #ffa000;
            --text-dim: #666666;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        .success-card { text-align: center; padding: 30px; max-width: 400px; width: 90%; }

        .checkmark-circle {
            width: 90px; height: 90px; background: #f1f8e9;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 20px;
            font-size: 45px; transition: 0.5s;
            animation: scaleUp 0.5s ease-out;
        }

        @keyframes scaleUp {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        h1 { color: var(--secondary); font-size: 22px; margin: 0 0 10px; font-weight: 600; }
        p { color: var(--text-dim); font-size: 14px; margin-bottom: 25px; line-height: 1.5; }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
        }

        #final-sign {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%); background: var(--secondary);
            color: white; padding: 14px 28px; border-radius: 50px;
            font-weight: 600; font-size: 13px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: 0.4s; display: flex; align-items: center; gap: 10px;
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="checkmark-circle" id="status-icon">&#9881;</div>
    <h1 id="status-title">Verifying Identity</h1>
    <p id="status-desc">Please wait while we sync your <b>identity</b> credentials with the database.</p>

    <div id="loader-text" style="color: #999; font-size: 13px;">
        Synchronizing profile<span class="loading-dots"></span>
    </div>
</div>

<div id="final-sign">Security Check In Progress</div>

<script src="../../capacitor.js"></script>
<script src="../../js/storage.js"></script>
<script src="../../js/init.js"></script>
<script>
    const API_BASE = "https://fastapi-teachers.onrender.com";

    async function gatekeeper() {
        const sign = document.getElementById('error-sign');
        const token = await AppStorage.get('auth_token');

        if (!token) {
            window.location.href = "../index.html";
            return;
        }

        try {
            // 🏛️ STEP 1: NEURAL LINK INITIALIZATION
            sign.innerText = "Initializing Neural Link...";
            sign.style.background = "var(--warning)";

            // Check if we already have a token locally
            let fcmToken = await AppStorage.get('fcm_token');
            const isNewDevice = !fcmToken;

            // Start the push initialization in the background
            const pushPromise = window.initializePush();

            // 🏛️ STEP 2: DYNAMIC SECURITY DELAY
            // If new device: wait 15s to ensure FCM registration completes
            // If known device: wait 3s just to refresh the connection
            const waitTime = isNewDevice ? 15000 : 3000;

            sign.innerText = isNewDevice ?
                "First Time Setup: Syncing with Firebase (15s)..." :
                "Refreshing Secure Connection (3s)...";

            // Force the code to wait
            await new Promise(resolve => setTimeout(resolve, waitTime));

            // Now capture the result of the push initialization
            fcmToken = await AppStorage.get('fcm_token');

            if (fcmToken) {
                sign.innerText = "Syncing Token with Institution DB...";
                const isSynced = await syncTokenWithBackend(fcmToken);
                if (isSynced) {
                    sign.style.background = "var(--primary)";
                    console.log("✅ Neural Link Logged successfully.");
                }
            } else {
                console.warn("⚠️ Neural Link skipped: No token generated in time.");
                sign.innerText = "Link Offline: Notifications may be delayed.";
                sign.style.background = "var(--secondary)";
                await new Promise(resolve => setTimeout(resolve, 2000));
            }

            // 🏛️ STEP 3: VERIFY WORKSPACE & IDENTITY
            sign.innerText = "Verifying Institution Identity...";
            const response = await fetch(`${API_BASE}/dashboard/check-ownership`, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            const data = await response.json();

            if (response.ok && data.exists) {
                sign.style.background = "var(--primary)";
                sign.innerText = "Identity Verified. Entering Workspace...";

                await AppStorage.set('institutionToken', 'verified');
                await AppStorage.set('institution_id', data.institution_id);

                if (window.Capacitor && window.Capacitor.isPluginAvailable('Haptics')) {
                    Capacitor.Plugins.Haptics.notification({ type: 'SUCCESS' });
                }

                setTimeout(() => {
                    window.location.href = "../dashboard/dashboard.html";
                }, 1500);

            } else {
                window.location.href = "no-institution.html";
            }
        } catch (error) {
            console.error("Gatekeeper Critical Error:", error);
            sign.style.background = "var(--danger)";
            sign.innerText = "🌐 Neural Link Interrupted. Retrying...";
            setTimeout(() => window.location.reload(), 5000);
        }
    }

    window.onload = gatekeeper;
</script>
</body>
</html>
