<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admission - Institution</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #0288d1;
            --secondary: #263238;
            --bg: #f8f9fa;
            --success: #2e7d32;
            --danger: #d32f2f;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--secondary); padding-bottom: 50px; }

        header {
            padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            background: white; box-shadow: 0 2px 15px rgba(0,0,0,0.04);
            position: sticky; top: 0; z-index: 100;
        }

        /* 🔄 Skeleton Loader */
        #scan-loader {
            display: none; padding: 30px; background: white; border-radius: 20px;
            border: 2px dashed var(--primary); margin: 20px auto; max-width: 450px; text-align: center;
        }
        .skeleton-title { height: 20px; width: 60%; background: #e0e7ff; margin: 10px auto; border-radius: 10px; animation: pulse 1.5s infinite; }
        .skeleton-line { height: 12px; width: 90%; background: #f1f5f9; margin: 8px auto; border-radius: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* 🗂️ Tabbed Overlay Results */
        #ai-results-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2000; backdrop-filter: blur(5px);
        }
        .results-card {
            background: white; width: 92%; max-width: 500px; margin: 5% auto;
            border-radius: 25px; height: 80vh; display: flex; flex-direction: column; overflow: hidden;
        }
        .tab-header {
            display: flex; overflow-x: auto; background: #f8fafc; padding: 10px;
            border-bottom: 1px solid #e2e8f0; gap: 10px; scrollbar-width: none;
        }
        .tab-btn {
            padding: 8px 15px; border-radius: 20px; border: 1px solid #cbd5e1;
            background: white; font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer;
        }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .tab-content { flex: 1; padding: 20px; overflow-y: auto; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-item label { font-size: 9px; color: #94a3b8; margin-bottom: 4px; display: block; }
        .grid-item input { background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px; border-radius: 8px; font-size: 13px; }

        .action-footer { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .btn-save-bulk { flex: 2; background: var(--success); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; }
        .btn-cancel { flex: 1; background: #f1f5f9; color: #64748b; border: none; padding: 12px; border-radius: 12px; }

        .back-link { border: none; background: none; font-weight: 600; cursor: pointer; color: #666; display: flex; align-items: center; gap: 8px; font-size: 15px; text-decoration: none;}

        .scan-btn-modern {
            background: linear-gradient(135deg, var(--primary), #00bcd4);
            color: white; border: none; padding: 10px 18px; border-radius: 30px;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
        }

        /* 🏷️ Notification Box - Used instead of alerts */
        .sign-box {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            width: 85%; padding: 15px; border-radius: 12px; text-align: center;
            font-weight: 600; display: none; z-index: 1000; animation: fadeIn 0.3s ease;
        }
        .sign-green { background: #ecfdf5; color: var(--success); border: 1px solid #10b981; }
        .sign-red { background: #fef2f2; color: var(--danger); border: 1px solid #ef4444; }

        .form-container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #eee; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 700; margin-bottom: 6px; color: #999; text-transform: uppercase; letter-spacing: 1px; }

        input, select {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 1.5px solid #f0f0f0; box-sizing: border-box; font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--primary); }

        .submit-btn {
            background: var(--secondary); color: white; border: none; padding: 16px;
            width: 100%; border-radius: 14px; font-weight: 600; font-size: 16px;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        .flex-row-btn {
            background: #fff; color: var(--primary); border: 1px dashed #cbd5e1;
            padding: 10px; width: 100%; border-radius: 10px; cursor: pointer; margin: 10px 0; font-weight: 600;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <a href="dashboard.html" class="back-link">✕ Back</a>
    <button class="scan-btn-modern" onclick="triggerScan()">AI Scan Register</button>
</header>

<div id="statusBox" class="sign-box"></div>

<div class="form-container">
    <div class="card">
        <form id="admissionForm">
            <div class="input-group"><label>Full Name</label><input type="text" id="stdName" required></div>
            <div class="input-group"><label>Father's Name</label><input type="text" id="fatherName" required></div>

            <div class="input-group">
                <label>Section / Class</label>
                <select id="sectionSelect" onchange="checkCustom(this)" required>
                    <option value="" disabled selected>Loading...</option>
                </select>
            </div>

            <div class="input-group" id="customSectionGroup" style="display:none;">
                <label>New Section Name</label>
                <input type="text" id="newSectionInput" placeholder="e.g. 10th-A">
            </div>

            <div class="input-group"><label>Admission Fee</label><input type="number" id="stdFee" value="0"></div>

            <div id="flexibleRows"></div>
            <button type="button" class="flex-row-btn" onclick="addNewRow()">+ Add Extra Field</button>
            <button type="submit" class="submit-btn" id="subBtn">Confirm Admission</button>
        </form>
    </div>
</div>

<input type="file" id="ai-scan-input" accept="image/*" style="display:none" onchange="performAIScan(this.files[0])">

<div id="scan-loader">
    <div class="skeleton-title"></div>
    <div class="skeleton-line"></div>
    <div class="skeleton-line"></div>
    <p style="font-size: 12px; color: var(--primary); font-weight: 600;">Gemini is reading register data...</p>
</div>

<div id="ai-results-overlay">
    <div class="results-card">
        <div style="padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0; font-size: 18px;">Review Students</h3>
            <span id="student-count-badge" style="background: var(--primary); color: white; padding: 2px 10px; border-radius: 10px; font-size: 12px;">0</span>
        </div>

        <div class="tab-header" id="tabs-container"></div>

        <div class="tab-content" id="active-tab-content">
        </div>

        <div class="action-footer">
            <button class="btn-cancel" onclick="closeOverlay()">Cancel</button>
            <button class="btn-save-bulk" id="bulk-save-btn" onclick="saveAllToDatabase()">Save All to Institution</button>
        </div>
    </div>
</div>

<script src="../../capacitor.js"></script>
<script src="../../js/storage.js"></script>
<script src ="../../js/sync-manager.js"></script>
<script src="../../js/global-core.js"></script>
<script>
    const API_URL = "https://fastapi-teachers.onrender.com";
    let authToken = null;

    const sectionSelect = document.getElementById('sectionSelect');
    const customSectionGroup = document.getElementById('customSectionGroup');
    const newSectionInput = document.getElementById('newSectionInput');
    const admissionForm = document.getElementById('admissionForm');
    const subBtn = document.getElementById('subBtn');

    window.onload = async () => {
        // Mocking AppStorage or using your existing storage helper
        try {
            const tokenRes = await AppStorage.get("auth_token");
            authToken = tokenRes.value || tokenRes;
        } catch(e) { console.error("Storage error", e); }

        if (!authToken) {
            location.replace("../../index.html");
            return;
        }
        loadSections();
    };

    function showStatus(msg, ok) {
        const box = document.getElementById("statusBox");
        box.innerText = msg;
        box.className = ok ? "sign-box sign-green" : "sign-box sign-red";
        box.style.display = "block";
        setTimeout(() => box.style.display = "none", 4000);
    }

    async function loadSections() {
        sectionSelect.innerHTML = `<option disabled selected>Syncing...</option>`;

        try {
            const res = await fetch(`${API_URL}/dashboard/sections`, {
                headers: { Authorization: `Bearer ${authToken}` }
            });

            sectionSelect.innerHTML = `<option value="" disabled selected>Select Section</option>`;

            if (res.ok) {
                const sections = await res.json();
                sections.forEach(sec => {
                    const opt = document.createElement("option");
                    opt.value = sec;
                    opt.textContent = sec;
                    sectionSelect.appendChild(opt);
                });
            }

            // Append the "Add New" option at the end
            const custom = document.createElement("option");
            custom.value = "__CUSTOM__";
            custom.textContent = "+ Add New Section";
            custom.style.fontWeight = "bold";
            sectionSelect.appendChild(custom);

        } catch (e) {
            showStatus("Offline mode: Manual entry required", false);
            sectionSelect.innerHTML = `<option value="__CUSTOM__" selected>+ Add New Section</option>`;
            checkCustom(sectionSelect);
        }
    }

    function checkCustom(sel) {
        if (sel.value === "__CUSTOM__") {
            customSectionGroup.style.display = "block";
            newSectionInput.required = true;
            newSectionInput.focus();
        } else {
            customSectionGroup.style.display = "none";
            newSectionInput.required = false;
        }
    }

    function addNewRow() {
        const row = document.createElement("div");
        row.style = "display:flex;gap:8px;margin-bottom:10px;";
        row.className = "row-item";
        row.innerHTML = `
            <input class="extra-key" placeholder="Field" style="flex:1">
            <input class="extra-val" placeholder="Value" style="flex:1">
            <button type="button" onclick="this.parentElement.remove()" style="background:none;border:none;color:red;font-size:18px;">✕</button>
        `;
        document.getElementById('flexibleRows').appendChild(row);
    }

    admissionForm.onsubmit = async (e) => {
        e.preventDefault();

        let finalSection = sectionSelect.value;
        if (finalSection === "__CUSTOM__") {
            finalSection = newSectionInput.value.trim();
        }

        if (!finalSection) {
            showStatus("Please select or enter a section", false);
            return;
        }

        subBtn.disabled = true;
        subBtn.innerText = "Processing...";

        const extras = {};
        document.querySelectorAll(".row-item").forEach(r => {
            const k = r.querySelector(".extra-key").value.trim();
            const v = r.querySelector(".extra-val").value.trim();
            if (k) extras[k] = v;
        });

        const payload = {
            name: document.getElementById('stdName').value.trim(),
            father_name: document.getElementById('fatherName').value.trim(),
            section: finalSection,
            fee: Number(document.getElementById('stdFee').value || 0),
            extra_fields: extras
        };

        try {
            const res = await fetch(`${API_URL}/dashboard/admit-student`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: `Bearer ${authToken}`
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                showStatus("Student Admitted Successfully!", true);
                admissionForm.reset();
                customSectionGroup.style.display = "none";
                document.getElementById('flexibleRows').innerHTML = "";
                loadSections(); // Refresh sections to include the new one if created
            } else {
                const errorData = await res.json();
                showStatus(errorData.detail || "Registration Failed", false);
            }
        } catch (e) {
            showStatus("Network Error: Check connection", false);
        } finally {
            subBtn.disabled = false;
            subBtn.innerText = "Confirm Admission";
        }
    };

    let scannedStudents = [];
    let activeTabIndex = 0;

    function triggerScan() {
        document.getElementById('ai-scan-input').click();
    }

    async function performAIScan(file) {
        if (!file) return;
        const loader = document.getElementById('scan-loader');
        loader.style.display = "block";
        showStatus("AI is processing image...", true);

        const formData = new FormData();
        formData.append("file", file);

        try {
            const response = await fetch(`${API_URL}/scanner/admission/scan-register`, {
                method: "POST",
                headers: { 'Authorization': `Bearer ${authToken}` },
                body: formData
            });

            if (!response.ok) throw new Error("Scan failed");

            const data = await response.json();
            // Assuming AI returns {"students": [...]} or a list
            scannedStudents = Array.isArray(data) ? data : (data.students || [data]);

            if (scannedStudents.length > 0) {
                openOverlay();
            } else {
                showStatus("No student data found", false);
            }
        } catch (err) {
            showStatus(err.message, false);
        } finally {
            loader.style.display = "none";
        }
    }

    function openOverlay() {
        document.getElementById('ai-results-overlay').style.display = "block";
        renderTabs();
    }

    function closeOverlay() {
        document.getElementById('ai-results-overlay').style.display = "none";
    }

    function renderTabs() {
        const container = document.getElementById('tabs-container');
        document.getElementById('student-count-badge').innerText = scannedStudents.length;
        container.innerHTML = "";

        scannedStudents.forEach((std, index) => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${index === activeTabIndex ? 'active' : ''}`;
            btn.innerHTML = `${std.name || 'New Student'} <span onclick="deleteStudent(${index}, event)">✕</span>`;
            btn.onclick = () => { activeTabIndex = index; renderTabs(); };
            container.appendChild(btn);
        });

        renderActiveStudent();
    }

    function renderActiveStudent() {
        const content = document.getElementById('active-tab-content');
        const std = scannedStudents[activeTabIndex];
        if (!std) { content.innerHTML = ""; return; }

        content.innerHTML = `
        <div class="data-grid">
            <div class="grid-item"><label>Name</label><input type="text" value="${std.name || ''}" oninput="updateData('name', this.value)"></div>
            <div class="grid-item"><label>Father Name</label><input type="text" value="${std.father_name || ''}" oninput="updateData('father_name', this.value)"></div>
            <div class="grid-item"><label>Section</label><input type="text" value="${std.section || ''}" oninput="updateData('section', this.value)"></div>
            <div class="grid-item"><label>Fee</label><input type="number" value="${std.fee || 0}" oninput="updateData('fee', this.value)"></div>
        </div>
        <h4 style="font-size: 11px; margin-top: 20px; color: #64748b;">Extra Fields Found</h4>
        <div class="data-grid" id="extra-fields-grid">
            ${Object.entries(std.extra_fields || {}).map(([key, val]) => `
                <div class="grid-item"><label>${key}</label><input type="text" value="${val}" oninput="updateExtra('${key}', this.value)"></div>
            `).join('')}
        </div>
    `;
    }

    function updateData(key, val) { scannedStudents[activeTabIndex][key] = val; }
    function updateExtra(key, val) { scannedStudents[activeTabIndex].extra_fields[key] = val; }

    function deleteStudent(index, e) {
        e.stopPropagation();
        scannedStudents.splice(index, 1);
        activeTabIndex = 0;
        if (scannedStudents.length === 0) closeOverlay();
        else renderTabs();
    }

    async function saveAllToDatabase() {
        if (scannedStudents.length === 0) return;

        const btn = document.getElementById('bulk-save-btn');
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Finalizing Admissions...`;

        try {
            // Map the data to match your AdmissionPayload schema exactly
            const payload = scannedStudents.map(std => ({
                name: std.name?.trim() || "Unknown Student",
                father_name: std.father_name?.trim() || "",
                section: std.section || "Unassigned",
                fee: Number(std.fee || 0),
                extra_fields: std.extra_fields || {}
            }));

            const response = await fetch(`${API_URL}/dashboard/bulk-admit-students`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${authToken}`
                },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.ok) {
                // Success: Use the GREEN BOX rule
                showStatus(result.message, true);
                closeOverlay();

                // Clear local state
                scannedStudents = [];

                // Refresh UI components
                if (typeof loadSections === "function") loadSections();

                // Optional: Redirect to a 'Success' view or clear form
                document.getElementById('admissionForm').reset();
            } else {
                throw new Error(result.detail || "Bulk Save Failed");
            }

        } catch (e) {
            // Error: Use the RED BOX rule
            showStatus("Critical Error: " + e.message, false);
        } finally {
            btn.disabled = false;
            btn.innerText = "Save All to Institution";
        }
    }
</script>
</body>
</html>
