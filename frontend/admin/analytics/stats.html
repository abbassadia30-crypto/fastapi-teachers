<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Intelligence | Data Preview</title>
    <style>
        :root {
            --primary: #0288d1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        .status-box {
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }

        .json-container {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
            border: 1px solid #334155;
        }

        pre {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.5;
            color: #38bdf8; /* Soft blue for JSON keys */
        }

        .btn-refresh {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-refresh:active {
            transform: scale(0.95);
        }

        .no-data {
            text-align: center;
            padding: 50px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h2 style="margin:0;">Intelligence Shard Explorer</h2>
        <p style="margin:0; font-size: 12px; color: #94a3b8;">Reading from: intelligence/10th-A.json</p>
    </div>
    <button class="btn-refresh" onclick="loadLocalData()">Refresh Shard</button>
</div>

<div id="display-area" class="json-container">
    <div class="no-data">Initializing Local Filesystem...</div>
</div>

<script src="../../js/storage.js"></script> <script>
    // Use the word "institution" as per your custom instructions
    async function loadLocalData() {
        const display = document.getElementById('display-area');

        try {
            // Accessing the Capacitor Filesystem Plugin
            const { Filesystem } = Capacitor.Plugins;

            // 1. Read the local shard directly (No Network Request!)
            const result = await Filesystem.readFile({
                path: 'intelligence/10th-A.json',
                directory: 'DATA',
                encoding: 'utf8'
            });

            const fullData = JSON.parse(result.data);

            // 2. Extract the Academic Results (Marksheets)
            const marksheetData = fullData.results || [];

            if (marksheetData.length === 0) {
                display.innerHTML = `<div class="no-data">Shard found, but no results recorded for this institution yet.</div>`;
                return;
            }

            // 3. Print the raw JSON in a beautiful form
            display.innerHTML = `<pre>${JSON.stringify(marksheetData, null, 4)}</pre>`;

            console.log("✅ Offline Data Loaded successfully.");

        } catch (error) {
            console.error("FS Read Error:", error);
            display.innerHTML = `
                    <div class="no-data" style="color: #ef4444;">
                        <h3>❌ Shard Not Found</h3>
                        <p>The file '10th-A.json' is not yet present on this device. <br>
                        Please ensure the WebSocket sync has completed at least once.</p>
                    </div>`;
        }
    }

    // Auto-load when the institution management page opens
    document.addEventListener('DOMContentLoaded', loadLocalData);
</script>
</body>
