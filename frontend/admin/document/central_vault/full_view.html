<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Syllabus Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0288d1; --success: #2e7d32; --secondary: #263238; --error: #c62828; }
        body { font-family: 'Times New Roman', serif; background: #f0f2f5; margin: 0; padding: 20px; color: #000; padding-bottom: 100px; }

        /* 🔔 Notifier Box */
        #appNotifier {
            position: fixed; top: -100px; left: 0; width: 100%; padding: 18px;
            text-align: center; color: white; font-weight: 600; z-index: 12000;
            transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); font-family: 'Poppins', sans-serif;
        }
        .notifier-show { transform: translateY(100px); }

        .page { background: white; width: 95%; max-width: 900px; margin: 0 auto; padding: 40px; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; min-height: 1100px; }

        .header-table { width: 100%; border: 2px solid #000; border-collapse: collapse; margin-bottom: 20px; }
        .header-table td { border: 1px solid #000; padding: 20px; text-align: center; }
        .inst-name { font-size: 26px; font-weight: bold; text-transform: uppercase; color: #1a237e; }

        .info-bar { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 3px solid #000; padding: 8px 0; margin-bottom: 25px; font-size: 15px; }

        .syllabus-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 2px solid #000; }
        .syllabus-table th { background: #f2f2f2; border: 1px solid #000; padding: 12px; font-size: 14px; text-transform: uppercase; font-family: 'Poppins', sans-serif; }
        .syllabus-table td { border: 1px solid #000; padding: 15px; vertical-align: top; word-wrap: break-word; }

        [contenteditable="true"] { outline: 2px dashed var(--primary); background: #f0faff; padding: 2px; }

        .chapter-title { font-weight: bold; display: block; margin-top: 12px; font-size: 15px; color: #1a237e; }
        .topics { margin: 8px 0; padding-left: 25px; font-size: 14px; line-height: 1.6; }

        .control-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 15px; z-index: 2000; }
        .btn { padding: 12px 25px; border-radius: 12px; border: none; font-weight: 800; font-family: 'Poppins', sans-serif; cursor: pointer; }
        .btn-edit { background: var(--secondary); color: white; }
        .btn-save { background: var(--success); color: white; display: none; }

        @media print { .control-bar { display: none; } .page { box-shadow: none; width: 100%; margin: 0; } }
    </style>
</head>
<body>

<div id="appNotifier"></div>

<div class="page" id="printArea">
    <table class="header-table">
        <tr>
            <td>
                <div class="inst-name" id="displayInstName">LOADING...</div>
                <div style="font-size: 18px; font-weight: 800; margin-top: 8px;" id="docName">SYLLABUS PLAN</div>
            </td>
        </tr>
    </table>

    <div class="info-bar">
        <span>TARGET: <span id="viewClass">--</span></span>
        <span>DATE: <span id="viewDate">--</span></span>
    </div>

    <table class="syllabus-table">
        <thead>
        <tr>
            <th style="width: 25%;">Subject Area</th>
            <th>Syllabus Content</th>
        </tr>
        </thead>
        <tbody id="contentBody"></tbody>
    </table>
</div>

<div class="control-bar no-print">
    <button class="btn" style="background:#eee;" onclick="history.back()">BACK</button>
    <button class="btn btn-edit" id="editBtn" onclick="enableEditing()">✍️ EDIT CONTENT</button>
    <button class="btn btn-save" id="saveBtn" onclick="saveChanges()">💾 SAVE TO VAULT</button>
    <button class="btn" style="background:var(--primary); color:white;" onclick="window.print()">🖨️ PRINT</button>
</div>

<script src="../../../capacitor.js"></script>
<script src="../../../js/storage.js"></script>
<script>
    const API_BASE = "https://fastapi-teachers.onrender.com";
    let currentDocId = null;
    let notifyTimer;

    function notify(msg, type = 'success') {
        const n = document.getElementById('appNotifier');
        clearTimeout(notifyTimer);
        n.innerText = msg;
        n.style.background = type === 'error' ? 'var(--error)' : 'var(--success)';
        n.classList.add('notifier-show');
        notifyTimer = setTimeout(() => n.classList.remove('notifier-show'), 3000);
    }

    window.onload = async () => {
        // 🏛️ Get Institution Name from AppStorage as requested
        const instRes = await AppStorage.get('current_institution_name');
        const instName = (instRes && typeof instRes === 'object') ? instRes.value : instRes;
        document.getElementById('displayInstName').innerText = (instName || "Institution").toUpperCase();

        const data = JSON.parse(localStorage.getItem('current_syllabus_view'));
        if (!data) return;

        currentDocId = data.id;
        document.getElementById('docName').innerText = (data.name || "SYLLABUS").toUpperCase();
        document.getElementById('viewClass').innerText = Array.isArray(data.targets) ? data.targets.join(', ') : data.targets;
        document.getElementById('viewDate').innerText = data.date || new Date().toLocaleDateString('en-GB');

        renderTable(data.content);
    };

    function renderTable(content) {
        const tbody = document.getElementById('contentBody');
        tbody.innerHTML = content.map((section, idx) => `
            <tr>
                <td class="sec-title-cell" style="font-weight:bold; color:#1a237e;">${idx+1}. ${section.title}</td>
                <td class="details-cell">
                    ${section.chapters.map(chap => `
                        <div class="chapter-block">
                            <span class="chapter-title">${chap.name}</span>
                            <ul class="topics">${chap.topics.map(t => `<li>${t}</li>`).join('')}</ul>
                        </div>
                    `).join('')}
                </td>
            </tr>
        `).join('');
    }

    function enableEditing() {
        document.getElementById('editBtn').style.display = 'none';
        document.getElementById('saveBtn').style.display = 'block';
        document.getElementById('docName').contentEditable = "true";
        document.getElementById('viewClass').contentEditable = "true";
        document.querySelectorAll('.sec-title-cell, .chapter-title, .topics li').forEach(el => el.contentEditable = "true");
        notify("Editing Mode Active", "success");
    }

    async function saveChanges() {
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.disabled = true;
        saveBtn.innerText = "SYNCING...";

        const updatedContent = [];
        document.querySelectorAll('#contentBody tr').forEach(tr => {
            const sectionTitle = tr.querySelector('.sec-title-cell').innerText.replace(/^\d+\.\s+/, "");
            const chapters = [];
            tr.querySelectorAll('.chapter-block').forEach(block => {
                chapters.push({
                    name: block.querySelector('.chapter-title').innerText,
                    topics: Array.from(block.querySelectorAll('li')).map(li => li.innerText)
                });
            });
            updatedContent.push({ title: sectionTitle, chapters: chapters });
        });

        const payload = {
            name: document.getElementById('docName').innerText,
            subject: updatedContent.map(s => s.title).join(', '),
            targets: document.getElementById('viewClass').innerText.split(',').map(t => t.trim()),
            content: updatedContent
        };

        try {
            const resToken = await AppStorage.get('auth_token');
            const token = (resToken && typeof resToken === 'object') ? resToken.value : resToken;

            const res = await fetch(`${API_BASE}/central_vault/vault/update/${currentDocId}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                notify("Vault Updated Successfully");
                setTimeout(() => location.replace('syllabus.html'), 1000);
            } else {
                const err = await res.json();
                notify(err.detail || "Update Failed", "error");
            }
        } catch (e) {
            notify("Server Connection Error", "error");
        } finally {
            saveBtn.disabled = false;
            saveBtn.innerText = "💾 SAVE TO VAULT";
        }
    }
</script>
</body>
</html>
