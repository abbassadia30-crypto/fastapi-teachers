<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Syllabus Document</title>
    <style>
        /* 🏛️ Professional CSS for Institutional Standards */
        body { font-family: 'Times New Roman', serif; background: #f0f2f5; margin: 0; padding: 20px; color: #000; }
        .page { background: white; width: 95%; max-width: 850px; margin: 0 auto; padding: 50px; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; min-height: 1050px; }
        
        .header-table { width: 100%; border: 2px solid #000; border-collapse: collapse; margin-bottom: 20px; }
        .header-table td { border: 1px solid #000; padding: 15px; text-align: center; }
        .inst-name { font-size: 24px; font-weight: bold; text-transform: uppercase; }
        
        .info-bar { display: flex; justify-content: space-between; font-weight: bold; border-bottom: 2px solid #000; padding: 5px 0; margin-bottom: 20px; }
        
        .layout { display: grid; grid-template-columns: 3fr 1fr; gap: 30px; }
        
        .syllabus-table { width: 100%; border-collapse: collapse; }
        .syllabus-table th, .syllabus-table td { border: 1px solid #000; padding: 10px; text-align: left; vertical-align: top; }
        .syllabus-table th { background: #eeeeee; font-size: 14px; }

        .index-box { border-left: 2px solid #800000; padding-left: 15px; }
        .index-title { color: #800000; font-weight: bold; margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #ccc; }
        .index-item { font-size: 12px; margin-bottom: 6px; }

        .chapter-title { font-weight: bold; display: block; margin-top: 8px; font-size: 14px; text-decoration: underline; }
        .topics { margin: 3px 0; padding-left: 20px; font-size: 13px; list-style-type: square; }

        .watermark { position: absolute; bottom: 30px; right: 40px; font-size: 12px; color: rgba(0,0,0,0.2); font-weight: bold; }
        
        @media print { 
            body { background: none; padding: 0; } 
            .page { box-shadow: none; width: 100%; margin: 0; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

<button class="no-print" onclick="history.back()" style="margin-bottom: 10px; padding: 10px;">← Back to Vault</button>

<div class="page" id="printArea">
    <table class="header-table">
        <tr>
            <td>
                <div class="inst-name">ST. LIGHT INT. INSTITUTION</div>
                <div style="font-size: 16px; font-weight: bold;" id="docName">SYLLABUS PLAN</div>
            </td>
        </tr>
    </table>

    <div class="info-bar">
        <span>CLASS: <span id="viewClass">--</span></span>
        <span>DATE: <span id="viewDate">--</span></span>
    </div>

    <div class="layout">
        <div class="main-content">
            <table class="syllabus-table">
                <thead>
                    <tr>
                        <th style="width: 25%;">SUBJECT</th>
                        <th>SYLLABUS DETAILS</th>
                    </tr>
                </thead>
                <tbody id="contentBody"></tbody>
            </table>
        </div>

        <div class="index-box">
            <div class="index-title">INDEX</div>
            <div id="indexBody"></div>
        </div>
    </div>

    <div class="watermark">made by starlight</div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const data = JSON.parse(localStorage.getItem('current_syllabus_view'));
        if (!data) return;

        document.getElementById('docName').innerText = data.name.toUpperCase();
        document.getElementById('viewClass').innerText = data.targets.join(', ');
        document.getElementById('viewDate').innerText = data.date;

        const contentBody = document.getElementById('contentBody');
        const indexBody = document.getElementById('indexBody');

        data.content.forEach((section, idx) => {
            // Build Details
            let detailsHtml = "";
            section.chapters.forEach(chap => {
                detailsHtml += `<span class="chapter-title">${chap.name}</span>`;
                detailsHtml += `<ul class="topics">${chap.topics.map(t => `<li>${t}</li>`).join('')}</ul>`;
            });

            // Add Table Row
            contentBody.innerHTML += `
                <tr>
                    <td><strong>${section.title}</strong></td>
                    <td>${detailsHtml}</td>
                </tr>
            `;

            // Add Index Item
            indexBody.innerHTML += `<div class="index-item">${idx + 1}. ${section.title}</div>`;
        });
    });
</script>
</body>
</html>
