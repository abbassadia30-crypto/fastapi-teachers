<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Paper Console | Institution</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Amiri:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a237e; --bg: #f1f3f4; --accent: #d32f2f; --success: #2e7d32; --secondary: #263238; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: #000; overflow-x: hidden; }

        /* 🔔 Notifier & Red Confirmation Box */
        #notification-bar {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; padding: 15px; border-radius: 12px;
            color: white; text-align: center; transition: 0.4s; z-index: 2000; font-weight: 600;
        }
        .lang-ur .q-input {
            font-family: 'Noto Nastaliq Urdu', serif;
            height: 45px;
            padding-top: 10px;
        }
        .bg-red { background: var(--accent) !important; top: 20px !important; display: block !important; }
        .bg-green { background: var(--success) !important; top: 20px !important; display: block !important; }

        #confirm-box {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .confirm-content {
            background: white; padding: 25px; border-radius: 20px; text-align: center; width: 85%; max-width: 320px;
            border-top: 5px solid var(--accent);
        }

        /* 🏗️ Layout & Navigation */
        header { background: white; padding: 15px 20px; display: flex; align-items: center; border-bottom: 2px solid var(--primary); }
        .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 900; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: 700; font-size: 13px; cursor: pointer; color: #888; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .main-container { padding: 15px; max-width: 900px; margin: auto; padding-bottom: 120px; }
        .blueprint-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .type-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn-type { background: #fff; border: 1px solid #ddd; padding: 10px 5px; border-radius: 8px; font-size: 11px; font-weight: 800; }

        /* 📑 Vault Grid */
        #vault-list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .vault-card { background: white; border-radius: 12px; padding: 12px; border: 1px solid #eee; position: relative; display: flex; flex-direction: column; }
        .status-badge { position: absolute; top: 5px; right: 5px; font-size: 7px; background: #e8f5e9; color: var(--success); padding: 2px 5px; border-radius: 3px; font-weight: 900; }
        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .btn-card { border: none; padding: 6px; border-radius: 6px; font-size: 9px; font-weight: 700; cursor: pointer; }
        .btn-edit { background: #e3f2fd; color: #1565c0; }
        .btn-del { background: #ffebee; color: #c62828; }

        /* 🖋️ Language Styles */
        .lang-ar { font-family: 'Amiri', serif; direction: rtl; text-align: right; }
        .lang-ur { font-family: 'Noto Nastaliq Urdu', serif; direction: rtl; text-align: right; line-height: 2.5; }
        .lang-ar .part-row, .lang-ur .part-row { flex-direction: row-reverse; }
        .lang-ar .q-input, .lang-ur .q-input { text-align: right; font-size: 18px; }

        /* 📋 Canvas Styling */
        .paper-canvas { background: white; padding: 40px 30px; border: 1px solid #000; min-height: 800px; }
        .paper-header { border: 2px solid #000; padding: 15px; margin-bottom: 20px; text-align: center; }
        .editable-inst { font-size: 20px; font-weight: 900; border: none; text-align: center; width: 100%; text-transform: uppercase; background: transparent; outline: none; }
        .editable-head { border: none; border-bottom: 1px dashed #ccc; font-weight: 700; width: 80px; text-align: center; background: transparent; outline: none; }
        .question-block { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .q-header-row { display: flex; justify-content: space-between; font-weight: 800; border-bottom: 1px solid #000; margin-bottom: 10px; font-size: 14px; }
        .part-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
        .q-input { flex: 1; border: none; border-bottom: 1px solid #eee; font-size: 14px; outline: none; }

        .publish-footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #eee; display: flex; box-sizing: border-box; z-index: 1000; }
        .btn-action { background: var(--primary); color: white; border: none; flex: 1; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .q-row-wrapper {
            position: relative;
            margin-bottom: 10px;
            padding-right: 40px;
        }
        .btn-inline-add {
            position: absolute;
            right: 0;
            top: 0;
            background: #e8f5e9;
            color: var(--success);
            border: 1px solid var(--success);
            border-radius: 4px;
            width: 30px;
            height: 30px;
            font-weight: 900;
            cursor: pointer;
        }
        .sub-part-row {
            margin-left: 25px;
            margin-top: 5px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .sub-part-row input {
            font-size: 13px;
            border-bottom: 1px dashed #ccc !important;
        }
        .parts-toggle-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 11px;
            font-weight: 700;
            color: var(--secondary);
        }

        .switch {
            position: relative; display: inline-block; width: 34px; height: 18px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 18px;
        }
        .slider:before {
            position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Individual Row Delete */
        .btn-row-del {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
            border-radius: 4px;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div id="notification-bar"></div>

<div id="confirm-box">
    <div class="confirm-content">
        <h3 style="margin:0; color:var(--accent);">Delete Draft?</h3>
        <p style="font-size:12px; color:#666;">This action will permanently remove this paper from the institution vault.</p>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeConfirm()" style="flex:1; padding:10px; border:none; border-radius:8px; font-weight:700;">CANCEL</button>
            <button id="final-del-btn" style="flex:1; padding:10px; border:none; border-radius:8px; background:var(--accent); color:white; font-weight:700;">DELETE</button>
        </div>
    </div>
</div>

<header>
    <div onclick="history.back()" style="font-size:24px; cursor:pointer; margin-right:15px;">✕</div>
    <h2 id="page-title" style="margin:0; font-size:15px; font-weight: 900;">PAPER DESIGNER</h2>
</header>

<div class="tab-bar">
    <div class="tab active" id="t-design" onclick="switchTab('design')">DESIGN</div>
    <div class="tab" id="t-vault" onclick="switchTab('vault')">PENDING VAULT</div>
</div>

<div class="main-container" id="design-view">
    <div class="blueprint-card">
        <label style="font-size: 9px; font-weight: 800; color: var(--primary);">LANGUAGE LAYOUT</label>
        <select id="sel-lang" onchange="toggleLangLayout()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:15px; font-weight:700;">
            <option value="en">English (Standard)</option>
            <option value="ur">Urdu (Nastaliq RTL)</option>
            <option value="ar">Arabic (Naskh RTL)</option>
        </select>

        <div class="type-list">
            <button class="btn-type" onclick="showConfig('MCQs')">MCQs</button>
            <button class="btn-type" onclick="showConfig('Short')">Short Qs</button>
            <button class="btn-type" onclick="showConfig('Long')">Long Qs</button>
            <button class="btn-type" onclick="showConfig('Custom')">Custom</button>
        </div>

        <div id="config-panel" style="display:none; background:#f9f9f9; padding:15px; border-radius:10px; border:1px dashed #ccc;">
            <div id="custom-statement-box" style="display:none; margin-bottom:10px;">
                <input type="text" id="in-statement" placeholder="Section Heading (e.g. Translation)" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
            </div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="in-qty" placeholder="Qty" style="width:30%; padding:10px;">
                <input type="number" id="in-choice" placeholder="Attempt" style="width:30%; padding:10px;">
                <input type="number" id="in-marks" placeholder="Marks" style="width:30%; padding:10px;">
            </div>
            <button class="btn-action" style="margin-top:10px; padding:10px; font-size:12px;" onclick="addSectionToPaper()">ADD SECTION</button>
        </div>
    </div>

    <div class="paper-canvas" id="canvas-main">
        <div class="paper-header">
            <input type="text" class="editable-inst" value="LOADING..." id="p-inst-name">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; font-size: 11px; margin-top:10px;">
                <div>SUB: <input type="text" id="p-subject" class="editable-head" value="English"></div>
                <div>CLASS:
                    <select id="p-class" class="editable-head" style="border:none; background:transparent; width:70%;">
                        <option value="">Fetching...</option>
                    </select>
                </div>
                <div>TYPE: <input type="text" id="p-type" class="editable-head" value="Final"></div>
                <div>TIME: <input type="text" id="p-duration" class="editable-head" value="3h"></div>
            </div>
        </div>
        <div id="dynamic-content"></div>
    </div>
</div>

<div class="main-container" id="vault-view" style="display:none;">
    <div id="vault-list-container"></div>
</div>

<div class="publish-footer">
    <button class="btn-action" id="btn-save" onclick="saveToVault()">SAVE TO INSTITUTION VAULT</button>
</div>

<script src="../../capacitor.js"></script>
<script src="../../js/storage.js"></script>

<script>
        const API_URL = "https://fastapi-teachers.onrender.com";
        let activeType = '';
        let vaultData = [];
        let currentEditId = null;

        window.onload = async () => {
        const data = await AppStorage.get("current_institution_name");
        let name = data.value || data || "MY INSTITUTION";
        document.getElementById('p-inst-name').value = name.replace(/"/g, "").toUpperCase();

        // 🔥 FIX 1: Fetch real sections from DB on load
        await loadSections();
    };

        async function loadSections() {
        const select = document.getElementById('p-class');
        try {
        const tRes = await AppStorage.get("auth_token");
        // 🔥 FIX 2: Check this endpoint in your FastAPI (usually /dashboard/my_sections)
        const res = await fetch(`${API_URL}/dashboard/sections`, {
        headers: { 'Authorization': `Bearer ${tRes.value || tRes}` }
    });

        if (res.ok) {
        const rawData = await res.json();
        // 🔥 FIX 3: Robust handling if backend returns { "sections": [...] }
        const sections = Array.isArray(rawData) ? rawData : (rawData.sections || []);

        if(sections.length === 0) {
        select.innerHTML = '<option value="">No Sections Found</option>';
        return;
    }
        select.innerHTML = sections.map(s => `<option value="${s}">${s}</option>`).join('');

        // Keep the selection if we are editing
        if(currentEditId) {
        const p = vaultData.find(x => x.id === currentEditId);
        if(p) select.value = p.target_class;
    }
    } else {
        select.innerHTML = '<option value="General">Manual Entry Mode</option>';
    }
    } catch (e) {
        select.innerHTML = '<option value="General">Offline Mode</option>';
    }
    }

        function switchTab(t) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('design-view').style.display = t === 'design' ? 'block' : 'none';
        document.getElementById('vault-view').style.display = t === 'vault' ? 'block' : 'none';
        document.querySelector('.publish-footer').style.display = t === 'design' ? 'flex' : 'none';
        if(t === 'vault') fetchVault();
    }

        function showConfig(type) {
        activeType = type;
        document.getElementById('config-panel').style.display = 'block';
        document.getElementById('custom-statement-box').style.display = (type === 'Custom') ? 'block' : 'none';
    }

        function toggleLangLayout() {
        const lang = document.getElementById('sel-lang').value;
        const canvas = document.getElementById('canvas-main');
        canvas.classList.remove('lang-ar', 'lang-ur');
        if(lang !== 'en') canvas.classList.add('lang-' + lang);
    }

        function addSectionToPaper() {
        const qty = parseInt(document.getElementById('in-qty').value) || 1;
        const choice = parseInt(document.getElementById('in-choice').value) || qty;
        const marks = parseInt(document.getElementById('in-marks').value) || 1;
        const dynamicContent = document.getElementById('dynamic-content');

        let targetBlock = dynamicContent.lastElementChild;
        if (!targetBlock || targetBlock.dataset.type !== activeType || activeType === 'Custom') {
        targetBlock = document.createElement('div');
        targetBlock.className = 'question-block';
        targetBlock.dataset.marks = marks;
        targetBlock.dataset.choice = choice;
        targetBlock.dataset.type = activeType;

        let hText = (activeType === 'MCQs') ? "Multiple Choice Questions" : (activeType === 'Short' ? "Short Questions" : "Long Questions");
        if(activeType === 'Custom') hText = document.getElementById('in-statement').value;

        targetBlock.innerHTML = `
                <div class="q-header-row">
                    <span>${hText}</span>
                    <span class="marks-label">(${choice * marks} Marks)</span>
                </div>
                ${activeType === 'Long' ? `
                <div class="parts-toggle-wrap">
                    <label class="switch">
                        <input type="checkbox" checked onchange="togglePartsVisibility(this)">
                        <span class="slider"></span>
                    </label>
                    <span>Enable (a) & (b) parts</span>
                </div>` : ''}
                <div class="q-container"></div>
            `;
        dynamicContent.appendChild(targetBlock);
    }

        const container = targetBlock.querySelector('.q-container');
        const existingCount = container.querySelectorAll('.q-row-wrapper').length;

        for(let i=1; i<=qty; i++) {
        createNewQuestionRow(container, existingCount + i);
    }
        document.getElementById('config-panel').style.display = 'none';
    }

        function createNewQuestionRow(container, index, val = "", subparts = []) {
        const wrapper = document.createElement('div');
        wrapper.className = 'q-row-wrapper';
        wrapper.style.marginBottom = '15px';

        wrapper.innerHTML = `
            <div class="part-row" style="display:flex; gap:10px; align-items:center;">
                <span class="q-num" style="font-weight:bold; min-width:20px;">${index}.</span>
                <input type="text" class="q-input" value="${val}" style="flex:1" placeholder="Type question here...">
                <div style="display:flex; gap:5px;">
                    <button class="btn-inline-add" onclick="addSpecificSubPart(this)" title="Add Part (a,b..)"
                            style="background:#e3f2fd; border:1px solid #2196f3; color:#2196f3; width:30px; border-radius:4px; position:static;">(a)</button>
                    <button class="btn-inline-add" onclick="addSibling(this)" title="Add New Question"
                            style="background:#e8f5e9; border:1px solid #2ecc71; color:#2ecc71; width:30px; border-radius:4px; position:static;">+</button>
                    <button class="btn-row-del" onclick="removeRow(this)"
                            style="background:#ffebee; border:1px solid #f44336; color:#f44336; width:30px; border-radius:4px;">×</button>
                </div>
            </div>
            <div class="sub-container" style="margin-left:30px; border-left: 2px solid #f0f0f0; padding-left: 10px;"></div>
        `;

        const subCont = wrapper.querySelector('.sub-container');
        if (subparts.length > 0) {
        subparts.forEach((sp, idx) => addSubPart(subCont, sp, String.fromCharCode(97 + idx)));
    }
        container.appendChild(wrapper);
        renumberQuestions(container);
    }

        function addSpecificSubPart(btn) {
        const wrapper = btn.closest('.q-row-wrapper');
        const subCont = wrapper.querySelector('.sub-container');
        addSubPart(subCont, "");
        showNotify("Part Added to Question", "green");
    }

        function togglePartsVisibility(checkbox) {
        const block = checkbox.closest('.question-block');
        const containers = block.querySelectorAll('.sub-container');
        containers.forEach(container => {
        if (checkbox.checked) {
        if (container.children.length === 0) {
        addSubPart(container, "", "a");
        addSubPart(container, "", "b");
    }
        container.style.display = 'block';
    } else {
        container.style.display = 'none';
    }
    });
    }

        function removeRow(btn) {
        const row = btn.closest('.q-row-wrapper');
        const container = row.parentElement;
        row.remove();
        renumberQuestions(container);
        showNotify("Question Removed", "red");
    }

        function renumberQuestions(container) {
        container.querySelectorAll('.q-row-wrapper').forEach((wrapper, i) => {
            wrapper.querySelector('.q-num').innerText = (i + 1) + ".";
        });
    }

        function addSibling(btn) {
        const container = btn.closest('.q-container');
        const index = container.querySelectorAll('.q-row-wrapper').length + 1;
        createNewQuestionRow(container, index);
    }

        function addSubPart(container, val = "", label = null) {
        const count = container.children.length;
        const char = label || String.fromCharCode(97 + count);
        const div = document.createElement('div');
        div.className = 'sub-part-row';
        div.style.display = 'flex'; div.style.gap = '10px'; div.style.marginTop = '8px'; div.style.alignItems = 'center';
        div.innerHTML = `
            <span style="font-size:12px; font-weight:600;">(${char})</span>
            <input type="text" class="sub-input q-input" value="${val}" style="flex:1; font-size:13px; border-bottom:1px dashed #ccc !important;">
            <button onclick="this.parentElement.remove()" style="border:none; background:none; color:red; cursor:pointer; font-weight:bold;">×</button>
        `;
        container.appendChild(div);
    }

        async function saveToVault() {
        const btn = document.getElementById('btn-save');
        btn.innerText = "SAVING..."; btn.disabled = true;

        const blueprint = [];
        let grandTotal = 0;

        document.querySelectorAll('.question-block').forEach(block => {
        const questions = [];
        block.querySelectorAll('.q-row-wrapper').forEach(wrapper => {
        const mainQ = wrapper.querySelector('.part-row .q-input').value;
        const subQs = Array.from(wrapper.querySelectorAll('.sub-input')).map(si => si.value);
        questions.push({ text: mainQ, sub_parts: subQs });
    });

        const m = parseInt(block.dataset.marks);
        const c = parseInt(block.dataset.choice);
        grandTotal += (m * c);

        blueprint.push({
        type: block.dataset.type,
        marks_per_q: m,
        choice: c,
        questions: questions
    });
    });

        // 🔥 FIX 4: Consistently use 'content_blueprint' to match fetch logic
// Inside your saveToVault() function in the <script>
            const payload = {
                institution: document.getElementById('p-inst-name').value,
                subject: document.getElementById('p-subject').value,
                target_class: document.getElementById('p-class').value,
                paper_type: document.getElementById('p-type').value,
                duration: document.getElementById('p-duration').value,
                language: document.getElementById('sel-lang').value,
                // 🔥 CHANGE THIS LINE: It must match the Pydantic field name "blueprint"
                blueprint: blueprint,
                total_marks: grandTotal
            };

        const url = currentEditId ? `${API_URL}/document/papers/save-vault?paper_id=${currentEditId}` : `${API_URL}/document/papers/save-vault`;

        try {
        const tRes = await AppStorage.get("auth_token");
        const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${tRes.value || tRes}` },
        body: JSON.stringify(payload)
    });

        if(res.ok) {
        showNotify("Paper Secured", "green");
        setTimeout(() => location.reload(), 1200);
    } else {
        showNotify("Save Failed", "red");
        btn.disabled = false; btn.innerText = "SAVE TO VAULT";
    }
    } catch(e) {
        showNotify("Network Error", "red");
        btn.disabled = false;
    }
    }

        async function fetchVault() {
        const container = document.getElementById('vault-list-container');
        container.innerHTML = "Syncing...";
        try {
        const tRes = await AppStorage.get("auth_token");
        const res = await fetch(`${API_URL}/document/papers/vault-list`, {
        headers: { 'Authorization': `Bearer ${tRes.value || tRes}` }
    });
        vaultData = await res.json();
        container.innerHTML = vaultData.map(p => `
                <div class="vault-card">
                    <span class="status-badge">${p.status}</span>
                    <b style="font-size:12px;">${p.subject.toUpperCase()}</b>
                    <small>${p.target_class} | ${p.paper_type}</small>
                    <div class="card-actions" style="grid-template-columns: 1fr; gap: 4px;">
                        <button class="btn-card" style="background:var(--primary); color:white;" onclick="processPrint(${p.id})">PRINT</button>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;">
                            <button class="btn-card btn-edit" onclick="loadEdit(${p.id})">EDIT</button>
                            <button class="btn-card btn-del" onclick="confirmDelete(${p.id})">DEL</button>
                        </div>
                    </div>
                </div>
            `).join('');
    } catch(e) { container.innerHTML = "Sync Failed."; }
    }

        function loadEdit(id) {
        const p = vaultData.find(x => x.id === id);
        if(!p) return;
        currentEditId = p.id;
        switchTab('design');

        document.getElementById('btn-save').innerText = "UPDATE SECURED PAPER";
        document.getElementById('p-subject').value = p.subject;
        document.getElementById('p-class').value = p.target_class;
        document.getElementById('p-type').value = p.paper_type;
        document.getElementById('sel-lang').value = p.language;
        toggleLangLayout();

        const content = document.getElementById('dynamic-content');
        content.innerHTML = "";

        p.content_blueprint.forEach(sec => {
        const block = document.createElement('div');
        block.className = 'question-block';
        block.dataset.marks = sec.marks_per_q;
        block.dataset.choice = sec.choice;
        block.dataset.type = sec.type;

        block.innerHTML = `
                <div class="q-header-row">
                    <span>${sec.type}</span>
                    <span class="marks-label">(${sec.choice * sec.marks_per_q} Marks)</span>
                </div>
                <div class="q-container"></div>
            `;
        const qCont = block.querySelector('.q-container');
        sec.questions.forEach((qObj, idx) => {
        const text = typeof qObj === 'string' ? qObj : qObj.text;
        const subs = qObj.sub_parts || [];
        createNewQuestionRow(qCont, idx + 1, text, subs);
    });
        content.appendChild(block);
    });
        showNotify("Editor Hydrated", "green");
    }

        function confirmDelete(id) {
        document.getElementById('confirm-box').style.display = 'flex';
        document.getElementById('final-del-btn').onclick = () => performDelete(id);
    }
        function closeConfirm() { document.getElementById('confirm-box').style.display = 'none'; }
        async function performDelete(id) {
        const tRes = await AppStorage.get("auth_token");
        const res = await fetch(`${API_URL}/document/papers/delete/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${tRes.value || tRes}` }
    });
        if(res.ok) { showNotify("Removed", "green"); closeConfirm(); fetchVault(); }
    }
        function showNotify(msg, type) {
        const bar = document.getElementById('notification-bar');
        bar.innerText = msg; bar.className = 'bg-' + type;
        setTimeout(() => bar.className = "", 3000);
    }
        async function processPrint(id) {
        const paper = vaultData.find(p => p.id === id);
        if(!paper) return;
        const catchData = { title: paper.subject, section: paper.target_class, subject: paper.subject, max_marks: paper.total_marks };
        await AppStorage.set("last_printed_paper", JSON.stringify(catchData));
        window.location.href = "marksheet.html";
    }
</script>
