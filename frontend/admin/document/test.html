<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Paper Console | Institution</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Amiri:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a237e; --bg: #f1f3f4; --accent: #d32f2f; --success: #2e7d32; --secondary: #263238; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: #000; overflow-x: hidden; }

        /* 🔔 Notifier (Red/Green Sign Box) */
        #notification-bar {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; padding: 15px; border-radius: 12px;
            color: white; text-align: center; transition: 0.4s; z-index: 2000; font-weight: 600;
        }
        .bg-red { background: var(--accent) !important; top: 20px !important; display: block !important; }
        .bg-green { background: var(--success) !important; top: 20px !important; display: block !important; }

        header { background: white; padding: 15px 20px; display: flex; align-items: center; border-bottom: 2px solid var(--primary); flex-shrink: 0; }
        .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 900; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: 700; font-size: 13px; cursor: pointer; color: #888; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .main-container { padding: 15px; max-width: 900px; margin: auto; padding-bottom: 120px; box-sizing: border-box; }

        .blueprint-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .type-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn-type { background: #fff; border: 1px solid #ddd; padding: 10px 5px; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; }

        #config-panel { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-top: 10px; display: none; border: 1px dashed var(--primary); }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        .input-group div { flex: 1; display: flex; flex-direction: column; }
        .input-group label { font-size: 9px; font-weight: 800; color: var(--primary); margin-bottom: 2px; text-transform: uppercase; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 12px; box-sizing: border-box; }

        .paper-canvas { background: white; padding: 40px 30px; border: 1px solid #000; margin-top: 20px; min-height: 800px; display: flex; flex-direction: column; }
        .paper-header { border: 2px solid #000; padding: 15px; margin-bottom: 30px; text-align: center; }
        .editable-inst { font-size: 20px; font-weight: 900; border: none; text-align: center; width: 100%; outline: none; text-transform: uppercase; background: transparent; }
        .editable-head { border: none; border-bottom: 1px dashed #ccc; font-weight: 700; width: 80px; text-align: center; outline: none; background: transparent; }

        .question-block { margin-bottom: 25px; position: relative; padding: 10px; }
        .q-header-row { display: flex; justify-content: space-between; font-weight: 800; border-bottom: 1px solid #000; margin-bottom: 10px; font-size: 14px; }
        .main-q-row { margin-bottom: 15px; }
        .part-row { display: flex; gap: 10px; align-items: center; width: 100%; }
        .q-input { flex: 1; border: none; border-bottom: 1px solid #eee; font-size: 14px; outline: none; background: transparent; padding: 2px; }

        /* Vault Styling */
        .vault-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .btn-print { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; }

        .publish-footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #eee; display: flex; box-sizing: border-box; z-index: 1000; }
        .btn-action { background: var(--primary); color: white; border: none; flex: 1; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        /* RTL Layouts */
        .rtl-block { direction: rtl; text-align: right; }
        .rtl-block .q-input { font-family: 'Amiri', serif; font-size: 18px; }
        .lang-ar {
            font-family: 'Amiri', serif !important;
            direction: rtl !important;
            text-align: right !important;
        }
        .lang-ar .q-input { font-size: 18px; }

        /* Urdu Specific Font */
        .lang-ur {
            font-family: 'Noto Nastaliq Urdu', serif !important;
            direction: rtl !important;
        }
    </style>
</head>
<body>

<div id="notification-bar"></div>

<header>
    <div onclick="history.back()" style="font-size:24px; cursor:pointer; margin-right:15px;">✕</div>
    <h2 style="margin:0; font-size:15px; font-weight: 900;">INSTITUTION TEST CONSOLE</h2>
</header>

<div class="tab-bar">
    <div class="tab active" id="t-design" onclick="switchTab('design')">DESIGN PAPER</div>
    <div class="tab" id="t-vault" onclick="switchTab('vault')">PENDING VAULT</div>
</div>

<div class="main-container" id="design-view">
    <div class="blueprint-card">
        <label style="font-size: 10px; font-weight: 800; color: #666;">1. SELECT LANGUAGE</label>
        <select id="sel-lang" onchange="toggleLangLayout()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:15px;">
            <option value="en">English Layout</option>
            <option value="ur">Urdu Layout (RTL)</option>
            <option value="ar">Arabic Layout (RTL)</option>
        </select>

        <label style="font-size: 10px; font-weight: 800; color: #666;">2. CHOOSE QUESTION TYPE</label>
        <div class="type-list">
            <button class="btn-type" onclick="showConfig('MCQs')">MCQs</button>
            <button class="btn-type" onclick="shortConfig('Short')">Short Qs</button>
            <button class="btn-type" onclick="shortConfig('Long')">Long Qs</button>
            <button class="btn-type" onclick="showConfig('Custom')">Custom</button>
        </div>

        <div id="config-panel">
            <h4 id="panel-title" style="margin:0 0 10px 0; font-size:11px; color:var(--primary);">Configuring Section</h4>
            <div id="custom-statement-box" style="display:none; margin-bottom:10px;">
                <input type="text" id="in-statement" placeholder="Enter Question Statement" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
            </div>
            <div class="input-group">
                <div><label>Total Qs</label><input type="number" id="in-qty" value="5"></div>
                <div id="choice-wrap"><label>Attempt</label><input type="number" id="in-choice" value="5"></div>
                <div><label>Marks/Q</label><input type="number" id="in-marks" value="1"></div>
            </div>
            <div id="subparts-wrap" style="display:none; margin-bottom:10px;">
                <label>Sub-parts (a, b)</label>
                <select id="in-sub">
                    <option value="0">Single Question</option>
                    <option value="2">Include a & b parts</option>
                </select>
            </div>
            <button class="btn-action" style="padding:10px; font-size:12px;" onclick="addSectionToPaper()">ADD TO CANVAS</button>
        </div>
    </div>

    <div class="paper-canvas" id="canvas-main">
        <div class="paper-header">
            <input type="text" class="editable-inst" value="INSTITUTION NAME" id="p-inst-name">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size: 11px; margin-top:10px; border-bottom: 1px solid #eee; padding-bottom:10px;">
                <div>SUB: <input type="text" id="p-subject" class="editable-head" value="Subject"></div>
                <div>CLASS: <input type="text" id="p-class" class="editable-head" value="10th"></div>
                <div>TYPE: <input type="text" id="p-type" class="editable-head" value="Test"></div>
                <div>TIME: <input type="text" id="p-duration" class="editable-head" value="40m"></div>
            </div>
        </div>
        <div id="dynamic-content"></div>
    </div>
</div>

<div class="main-container" id="vault-view" style="display:none;">
    <div id="vault-list-container"></div>
</div>

<div class="publish-footer">
    <button class="btn-action" id="btn-save" onclick="saveToVault()">SAVE TO PENDING VAULT</button>
</div>

<script src="../../capacitor.js"></script>
<script src="../../js/storage.js"></script>

<script>
    const API_URL = "https://fastapi-teachers.onrender.com";
    let activeType = '';
    let vaultData = [];

    window.onload = async () => {
        try {
            const data = await AppStorage.get('current_institution_name');
            if(data && data.value) document.getElementById('p-inst-name').value = data.value;
        } catch(e) {}
    };

    function toggleLangLayout() {
        const lang = document.getElementById('sel-lang').value;
        const canvas = document.getElementById('canvas-main');

        // Remove old classes
        canvas.classList.remove('lang-ar', 'lang-ur');

        // Apply new class for RTL and Fonts
        if(lang === 'ar') canvas.classList.add('lang-ar');
        if(lang === 'ur') canvas.classList.add('lang-ur');
    }

    function switchTab(t) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('design-view').style.display = t === 'design' ? 'block' : 'none';
        document.getElementById('vault-view').style.display = t === 'vault' ? 'block' : 'none';
        document.querySelector('.publish-footer').style.display = t === 'design' ? 'flex' : 'none';
        if(t === 'vault') fetchVault();
    }

    function showConfig(type) {
        activeType = type;
        document.getElementById('config-panel').style.display = 'block';
        document.getElementById('custom-statement-box').style.display = (type === 'Custom') ? 'block' : 'none';
        document.getElementById('subparts-wrap').style.display = (type === 'Long') ? 'block' : 'none';
    }

    function shortConfig(type) { showConfig(type); }

    function addSectionToPaper() {
        const qty = parseInt(document.getElementById('in-qty').value);
        const choice = parseInt(document.getElementById('in-choice').value);
        const marks = parseInt(document.getElementById('in-marks').value);
        const sub = parseInt(document.getElementById('in-sub').value);

        const block = document.createElement('div');
        block.className = 'question-block';
        block.dataset.marks = marks;
        block.dataset.choice = choice;
        block.dataset.type = activeType;

        let headerText = (activeType === 'MCQs') ? "Choose the Correct Answer" : (activeType === 'Short' ? "Short Questions" : "Long Questions");
        if(activeType === 'Custom') headerText = document.getElementById('in-statement').value;

        block.innerHTML = `
            <div class="q-header-row">
                <span>${headerText} (${choice < qty ? 'Attempt ' + choice : 'All Questions'})</span>
                <span>(${choice * marks} Marks)</span>
            </div>
            <div class="q-container"></div>
        `;

        const container = block.querySelector('.q-container');
        for(let i=1; i<=qty; i++) {
            const qRow = document.createElement('div');
            qRow.className = 'main-q-row';
            qRow.innerHTML = `
                <div class="part-row">
                    <span>${i}.</span>
                    <input type="text" class="q-input" placeholder="Enter Question Content...">
                </div>
            `;
            container.appendChild(qRow);
        }

        document.getElementById('dynamic-content').appendChild(block);
        document.getElementById('config-panel').style.display = 'none';
        showNotify("Section Added", "green");
    }

    async function saveToVault() {
        const btn = document.getElementById('btn-save');
        btn.innerText = "SAVING...";

        const blueprint = [];
        let totalMarks = 0;

        document.querySelectorAll('.question-block').forEach(b => {
            const marks = parseInt(b.dataset.marks);
            const choice = parseInt(b.dataset.choice);
            totalMarks += (marks * choice);

            const qs = [];
            b.querySelectorAll('.q-input').forEach(inp => qs.push(inp.value));

            blueprint.push({
                type: b.dataset.type,
                marks_per_q: marks,
                choice: choice,
                questions: qs
            });
        });

        const payload = {
            institution: document.getElementById('p-inst-name').value,
            subject: document.getElementById('p-subject').value,
            target_class: document.getElementById('p-class').value,
            paper_type: document.getElementById('p-type').value,
            duration: document.getElementById('p-duration').value,
            blueprint: blueprint,
            total_marks: totalMarks
        };

        try {
            const tRes = await AppStorage.get("auth_token");
            const res = await fetch(`${API_URL}/document/papers/save-vault`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${tRes.value || tRes}` },
                body: JSON.stringify(payload)
            });
            if(res.ok) {
                showNotify("Secured in Vault", "green");
                setTimeout(() => location.reload(), 1000);
            }
        } catch(e) { showNotify("Sync Error", "red"); }
    }

    async function fetchVault() {
        const container = document.getElementById('vault-list-container');
        container.innerHTML = "Syncing...";
        try {
            const tRes = await AppStorage.get("auth_token");
            const res = await fetch(`${API_URL}/document/papers/vault-list`, {
                headers: { 'Authorization': `Bearer ${tRes.value || tRes}` }
            });
            vaultData = await res.json();
            container.innerHTML = vaultData.map(p => `
                <div class="vault-item">
                    <div>
                        <b style="font-size:14px;">${p.subject} (${p.target_class})</b><br>
                        <small>${p.paper_type} | Marks: ${p.total_marks}</small>
                    </div>
                    <button class="btn-print" onclick="processPrint(${p.id})">PRINT</button>
                </div>
            `).join('');
        } catch(e) { container.innerHTML = "Failed to load vault."; }
    }

    // --- THE BRIDGE TO MARKSHEET ARCHITECT ---
    async function processPrint(id) {
        const paper = vaultData.find(p => p.id === id);
        if(!paper) return;

        showNotify("Preparing Print & Archiving...", "green");

        // 1. Save data for Marksheet Architect "Catch"
        const catchData = {
            title: `${paper.paper_type}: ${paper.subject}`,
            section: paper.target_class,
            subject: paper.subject,
            max_marks: paper.total_marks
        };
        await AppStorage.set("last_printed_paper", JSON.stringify(catchData));

        // 2. Call API to move to 'Taken'
        try {
            const tRes = await AppStorage.get("auth_token");
            await fetch(`${API_URL}/document/papers/mark-taken/${id}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${tRes.value || tRes}` }
            });

            // 3. Redirect to Marksheet Architect
            setTimeout(() => {
                window.location.href = "marksheet_architect.html";
            }, 1000);
        } catch(e) { showNotify("Error moving to taken vault", "red"); }
    }

    function showNotify(msg, type) {
        const bar = document.getElementById('notification-bar');
        bar.innerText = msg;
        bar.className = type === 'red' ? 'bg-red' : 'bg-green';
        setTimeout(() => bar.className = "", 3000);
    }
</script>
</body>
</html>
