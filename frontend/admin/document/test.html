<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Paper Console | Institution</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Amiri:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a237e; --bg: #f1f3f4; --accent: #d32f2f; --success: #2e7d32; --secondary: #263238; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: #000; overflow-x: hidden; }

        /* 🔔 Notifier & Red Confirmation Box */
        #notification-bar {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; padding: 15px; border-radius: 12px;
            color: white; text-align: center; transition: 0.4s; z-index: 2000; font-weight: 600;
        }

        .paper-page {
            background: white;
            width: 210mm;      /* A4 Width */
            height: 297mm;     /* A4 Height */
            padding: 15mm 20mm;/* Standard Margins */
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
            display: none;     /* Hidden until active */
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .paper-page.active-page { display: block !important; }

        /* 🏛️ Right Bottom Watermark (On every page) */
        .paper-page::after {
            content: "MADE BY STARLIGHT";
            position: absolute; bottom: 15px; right: 15px;
            font-size: 8px; font-weight: 800; color: rgba(0, 0, 0, 0.1);
            letter-spacing: 1.5px; pointer-events: none; text-transform: uppercase;
        }

        /* Page Navigation UI */
        .page-controls {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin-bottom: 15px; background: white;
            padding: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .btn-nav {
            background: var(--primary); color: white; border: none;
            padding: 8px 15px; border-radius: 6px; font-weight: 700; cursor: pointer;
        }

        .page-info { font-weight: 800; font-size: 13px; color: var(--secondary); }

        /* General UI Styles */
        .bg-red { background: var(--accent) !important; top: 20px !important; display: block !important; }
        .bg-green { background: var(--success) !important; top: 20px !important; display: block !important; }

        #confirm-box {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .confirm-content {
            background: white; padding: 25px; border-radius: 20px; text-align: center; width: 85%; max-width: 320px;
            border-top: 5px solid var(--accent);
        }

        header { background: white; padding: 15px 20px; display: flex; align-items: center; border-bottom: 2px solid var(--primary); }
        .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 900; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: 700; font-size: 13px; cursor: pointer; color: #888; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* Printing & Export Logic */
        .exporting-pdf .btn-inline-add, .exporting-pdf .btn-row-del,
        .exporting-pdf .parts-toggle-wrap, .exporting-pdf button { display: none !important; }

        .exporting-pdf .q-input, .exporting-pdf .editable-head, .exporting-pdf .editable-inst {
            border: none !important; background: transparent !important; outline: none !important;
        }

        @media print {
            .btn-inline-add, .btn-row-del, .parts-toggle-wrap, button { display: none !important; }
            .paper-page { box-shadow: none !important; border: none !important; margin: 0 !important; }
        }

        /* Arabic Support */
        .lang-ar { direction: rtl; text-align: right; font-family: 'Amiri', serif; }
        .lang-ar .q-input { text-align: right; }
        /* Fix for Android/Capacitor Click issues */
        button, .btn-inline-add, .btn-row-del {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* Allow questions to grow vertically and wrap text */
        .q-input {
            display: block;
            width: 100%;
            min-height: 20px;
            white-space: pre-wrap; /* Preserves spaces and wraps text */
            word-wrap: break-word;
            border-bottom: 1px solid #eee;
            outline: none;
            padding: 2px 0;
        }

        /* Ensure the PDF process sees the full height */
        .exporting-pdf .paper-page {
            height: auto !important;
            overflow: visible !important;
        }
        /* Canvas Elements */
        /* 🏛️ Header with Logo Space */
        /* 🏛️ Professional Header with Left Logo */
        .paper-header {
            border: 2px solid #000;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            position: relative;
            padding-left: 90px; /* Space for Logo on the Left */
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .inst-logo-placeholder {
            position: absolute;
            top: 50%;
            left: 15px; /* Moved to Left */
            transform: translateY(-50%);
            width: 70px;
            height: 70px;
            border: 1px dashed #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
            color: #666;
            background: #fcfcfc;
            border-radius: 4px;
        }

        /* Ensure long text wraps instead of staying on one line */
        .q-input {
            white-space: normal;
            word-wrap: break-word;
            height: auto;
            min-height: 20px;
        }

        /* 🛠️ Fix for PDF Clipping */
        .exporting-pdf .paper-page {
            overflow: visible !important;
            height: auto !important;
            min-height: 297mm;
        }

        /* Visual indicator if content is too long for the institution paper */
        .paper-page {
            border-bottom: 5px solid transparent;
        }
        .page-overflow-warning {
            border-bottom: 5px solid var(--accent) !important;
        }

        /* Fix for Android Scaling overflow */
        #pages-container {
            height: auto;
            overflow: visible;
        }

        /* 📱 Improved Mobile Scaling */
        @media screen and (max-width: 768px) {
            .pages-wrapper {
                transform: scale(0.45);
                transform-origin: top center;
                width: 210mm;
                margin: 0 auto;
                margin-bottom: -600px; /* Adjust based on device height */
            }
        }
        .editable-inst { font-size: 20px; font-weight: 900; border: none; text-align: center; width: 100%; text-transform: uppercase; background: transparent; outline: none; }
        .editable-head { border: none; border-bottom: 1px dashed #ccc; font-weight: 700; width: 80px; text-align: center; background: transparent; outline: none; }
        .question-block { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .q-header-row { display: flex; justify-content: space-between; font-weight: 800; border-bottom: 1px solid #000; margin-bottom: 8px; font-size: 14px; }
        .q-input { flex: 1; border: none; border-bottom: 1px solid #eee; font-size: 14px; outline: none; }

        /* Language Specifics */
        .lang-ur { direction: rtl; text-align: right; }
        .lang-ur .q-input { font-family: 'Noto Nastaliq Urdu', serif; height: 45px; }

        .main-container { padding: 15px; max-width: 1000px; margin: auto; padding-bottom: 120px; }
        .blueprint-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .type-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn-type { background: #fff; border: 1px solid #ddd; padding: 10px 5px; border-radius: 8px; font-size: 11px; font-weight: 800; }

        .publish-footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; border-top: 1px solid #eee; display: flex; box-sizing: border-box; z-index: 1000; }
        .btn-action { background: var(--primary); color: white; border: none; flex: 1; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        #vault-list-container {
            display: grid;
            grid-template-columns: 1fr; /* Single column for mobile */
            gap: 15px;
            padding: 10px;
        }

        .vault-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: relative;
        }

        .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e8f5e9;
            color: var(--success);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
        }

        .card-actions {
            margin-top: 12px;
            display: grid;
            gap: 8px;
        }

        .btn-card {
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
        }

        /* 📱 Mobile Scaling for Android Capacitor */
        @media screen and (max-width: 768px) {
            .pages-wrapper {
                transform: scale(0.45); /* Scales the A4 down to fit phone width */
                transform-origin: top center;
                margin-bottom: -500px; /* Offset the scale gap */
            }
        }

        /* 🇸🇦 Arabic Layout Support */
        .lang-ar {
            direction: rtl !important;
            text-align: right !important;
            font-family: 'Amiri', serif;
        }
        .lang-ar .q-input, .lang-ar .sub-input {
            text-align: right !important;
        }
        .pages-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers paper horizontally */
            width: 100%;
            margin-top: 20px;
        }

        .header-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 11px;
            margin-top: 10px;
            text-align: left;
        }

        .lang-ur .header-info-grid, .lang-ar .header-info-grid {
            text-align: right;
        }
        /* Ensure controls stay visible while scaling */
        .page-controls { position: relative; z-index: 1100; margin-top: 10px; }
        /* Individual Row Controls */
        .q-row-wrapper { position: relative; margin-bottom: 10px; padding-right: 40px; }
        .btn-inline-add { background: #e8f5e9; color: var(--success); border: 1px solid var(--success); border-radius: 4px; width: 30px; height: 30px; font-weight: 900; cursor: pointer; }
        .btn-row-del { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; border-radius: 4px; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="notification-bar"></div>

<div id="confirm-box">
    <div class="confirm-content">
        <h3 style="margin:0; color:var(--accent);">Delete Draft?</h3>
        <p style="font-size:12px; color:#666;">This will remove the paper from the institution vault.</p>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeConfirm()" style="flex:1; padding:10px; border:none; border-radius:8px; font-weight:700;">CANCEL</button>
            <button id="final-del-btn" style="flex:1; padding:10px; border:none; border-radius:8px; background:var(--accent); color:white; font-weight:700;">DELETE</button>
        </div>
    </div>
</div>

<header>
    <div onclick="history.back()" style="font-size:24px; cursor:pointer; margin-right:15px;">✕</div>
    <h2 style="margin:0; font-size:15px; font-weight: 900;">PAPER DESIGNER</h2>
</header>

<div class="tab-bar">
    <div class="tab active" id="t-design" onclick="switchTab('design')">DESIGN</div>
    <div class="tab" id="t-vault" onclick="switchTab('vault')">PENDING VAULT</div>
</div>

<div class="main-container" id="design-view">
    <div class="blueprint-card">
        <label style="font-size: 9px; font-weight: 800; color: var(--primary);">LANGUAGE LAYOUT</label>
        <select id="sel-lang" onchange="toggleLangLayout()" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:15px; font-weight:700;">
            <option value="en">English (Standard)</option>
            <option value="ur">Urdu (Nastaliq RTL)</option>
            <option value="ar">Arabic (Modern Standard)</option>
        </select>

        <div class="type-list">
            <button class="btn-type" onclick="showConfig('MCQs')">MCQs</button>
            <button class="btn-type" onclick="showConfig('Short')">Short Qs</button>
            <button class="btn-type" onclick="showConfig('Long')">Long Qs</button>
            <button class="btn-type" onclick="showConfig('Custom')">Custom</button>
        </div>

        <div id="config-panel" style="display:none; background:#f9f9f9; padding:15px; border-radius:10px; border:1px dashed #ccc;">
            <div id="custom-statement-box" style="display:none; margin-bottom:10px;">
                <input type="text" id="in-statement" placeholder="Section Heading" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
            </div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="in-qty" placeholder="Qty" style="width:33%;">
                <input type="number" id="in-choice" placeholder="Attempt" style="width:33%;">
                <input type="number" id="in-marks" placeholder="Marks" style="width:33%;">
            </div>
            <button class="btn-action" style="margin-top:10px; height:40px;" onclick="addSectionToPaper()">ADD SECTION</button>
        </div>
    </div>

    <div class="page-controls">
        <button class="btn-nav" onclick="changePage(-1)">PREV</button>
        <div class="page-info">PAGE <span id="current-page-num">1</span> / <span id="total-pages-num">1</span></div>
        <button class="btn-nav" onclick="changePage(1)">NEXT</button>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button onclick="manualCreatePage()" style="flex: 1; padding: 10px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: 700;">+ ADD NEW PAGE</button>
        <button onclick="manualDeletePage()" style="flex: 1; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 700;">DELETE THIS PAGE</button>
    </div>

    <div id="pages-container" class="pages-wrapper">
        <div class="paper-page active-page" id="page-1">
            <div class="paper-header">
                <div class="inst-logo-placeholder">LOGO</div> <input type="text" class="editable-inst" value="LOADING..." id="p-inst-name">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; font-size: 11px; margin-top:10px;">
                    <div>SUB: <input type="text" id="p-subject" class="editable-head" value="English"></div>
                    <div>CLASS: <select id="p-class" class="editable-head" style="width:60%;"></select></div>
                    <div>TYPE: <input type="text" id="p-type" class="editable-head" value="Final"></div>
                    <div>TIME: <input type="text" id="p-duration" class="editable-head" value="3h"></div>
                </div>
            </div>
            <div id="dynamic-content-p1"></div>
        </div>
    </div>
</div>

<div class="main-container" id="vault-view" style="display:none;">
    <div id="vault-list-container"></div>
</div>

<div class="publish-footer">
    <button class="btn-action" id="btn-save" onclick="saveToVault()">SAVE TO INSTITUTION VAULT</button>
</div>
<script src="../../capacitor.js"></script>
<script src="../../js/storage.js"></script>

<script>
    const API_URL = "https://fastapi-teachers.onrender.com";
    let activeType = '';
    let vaultData = [];
    let currentEditId = null;
    let currentPage = 1;
    let totalPages = 1;
    const MAX_PAGE_HEIGHT_MM = 250; // A4 is 297mm, leaving room for margins/headers

    const langMap = {
        en: { sub: "SUB", class: "CLASS", type: "TYPE", time: "TIME", mcq: "Multiple Choice Questions", short: "Short Questions", long: "Long Questions" },
        ur: { sub: "مضمون", class: "جماعت", type: "قسم", time: "وقت", mcq: "کثیر الانتخابی سوالات", short: "مختصر سوالات", long: "انشائیہ سوالات" },
        ar: { sub: "المادة", class: "الصف", type: "نوع", time: "وقت", mcq: "أسئلة الاختيار من متعدد", short: "أسئلة قصيرة", long: "أسئلة طويلة" }
    };

        window.onload = async () => {
        const data = await AppStorage.get("current_institution_name");
        let name = data.value || data || "MY INSTITUTION";
        document.getElementById('p-inst-name').value = name.replace(/"/g, "").toUpperCase();

        // 🔥 FIX 1: Fetch real sections from DB on load
        await loadSections();
    };

        async function loadSections() {
        const select = document.getElementById('p-class');
        try {
        const tRes = await AppStorage.get("auth_token");
        // 🔥 FIX 2: Check this endpoint in your FastAPI (usually /dashboard/my_sections)
        const res = await fetch(`${API_URL}/dashboard/sections`, {
        headers: { 'Authorization': `Bearer ${tRes.value || tRes}` }
    });

        if (res.ok) {
        const rawData = await res.json();
        // 🔥 FIX 3: Robust handling if backend returns { "sections": [...] }
        const sections = Array.isArray(rawData) ? rawData : (rawData.sections || []);

        if(sections.length === 0) {
        select.innerHTML = '<option value="">No Sections Found</option>';
        return;
    }
        select.innerHTML = sections.map(s => `<option value="${s}">${s}</option>`).join('');

        // Keep the selection if we are editing
        if(currentEditId) {
        const p = vaultData.find(x => x.id === currentEditId);
        if(p) select.value = p.target_class;
    }
    } else {
        select.innerHTML = '<option value="General">Manual Entry Mode</option>';
    }
    } catch (e) {
        select.innerHTML = '<option value="General">Offline Mode</option>';
    }
    }

        function switchTab(t) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.getElementById('t-'+t).classList.add('active');
        document.getElementById('design-view').style.display = t === 'design' ? 'block' : 'none';
        document.getElementById('vault-view').style.display = t === 'vault' ? 'block' : 'none';
        document.querySelector('.publish-footer').style.display = t === 'design' ? 'flex' : 'none';
        if(t === 'vault') fetchVault();
    }

        function showConfig(type) {
        activeType = type;
        document.getElementById('config-panel').style.display = 'block';
        document.getElementById('custom-statement-box').style.display = (type === 'Custom') ? 'block' : 'none';
    }

    function toggleLangLayout() {
        const lang = document.getElementById('sel-lang').value;
        const container = document.getElementById('pages-container');
        container.classList.remove('lang-ar', 'lang-ur');
        if(lang !== 'en') container.classList.add('lang-' + lang);

        // Update Template Labels
        const labels = langMap[lang] || langMap.en;
        const header = document.querySelector('.paper-header');
        if(header) {
            header.innerHTML = `
            <div class="inst-logo-placeholder">LOGO</div>
            <input type="text" class="editable-inst" value="${document.getElementById('p-inst-name').value}" id="p-inst-name">
            <div class="header-info-grid">
                <div>${labels.sub}: <input type="text" id="p-subject" class="editable-head" value="${document.getElementById('p-subject').value}"></div>
                <div>${labels.class}: <select id="p-class" class="editable-head" style="width:60%;"></select></div>
                <div>${labels.type}: <input type="text" id="p-type" class="editable-head" value="${document.getElementById('p-type').value}"></div>
                <div>${labels.time}: <input type="text" id="p-duration" class="editable-head" value="${document.getElementById('p-duration').value}"></div>
            </div>
        `;
            loadSections(); // Re-fill the class dropdown
        }
    }

    function addSectionToPaper() {
        const qty = parseInt(document.getElementById('in-qty').value) || 1;
        const choice = parseInt(document.getElementById('in-choice').value) || qty;
        const marks = parseInt(document.getElementById('in-marks').value) || 1;
        const lang = document.getElementById('sel-lang').value;
        const labels = langMap[lang] || langMap.en;

        // Target the current active page
        let targetContentArea = document.getElementById(`dynamic-content-p${currentPage}`);

        let targetBlock = document.createElement('div');
        targetBlock.className = 'question-block';
        targetBlock.dataset.marks = marks;
        targetBlock.dataset.choice = choice;
        targetBlock.dataset.type = activeType;

        // 🛠️ FIXED HEADER LOGIC
        let hText = "";
        if (activeType === 'Custom') {
            hText = document.getElementById('in-statement').value || "Section";
        } else {
            // Explicitly map the type to the language label
            const typeKey = activeType.toLowerCase(); // 'mcqs', 'short', or 'long'

            // Handle the 'MCQs' vs 'mcq' mapping difference in your langMap
            const mapKey = typeKey === 'mcqs' ? 'mcq' : (typeKey === 'short' ? 'short' : 'long');
            hText = labels[mapKey];
        }

        targetBlock.innerHTML = `
        <div class="q-header-row">
            <span>${hText}</span>
            <span class="marks-label">(${choice * marks} Marks)</span>
        </div>
        <div class="q-container"></div>
    `;

        targetContentArea.appendChild(targetBlock);
        const container = targetBlock.querySelector('.q-container');

        for(let i=1; i<=qty; i++) {
            createNewQuestionRow(container, i);
        }

        document.getElementById('config-panel').style.display = 'none';
        showNotify(activeType + " Added Successfully", "green");
    }

        function createNewQuestionRow(container, index, val = "", subparts = []) {
        const wrapper = document.createElement('div');
        wrapper.className = 'q-row-wrapper';
        wrapper.style.marginBottom = '15px';

        wrapper.innerHTML = `
            <div class="part-row" style="display:flex; gap:10px; align-items:center;">
                <span class="q-num" style="font-weight:bold; min-width:20px;">${index}.</span>
              <span class="q-input" contenteditable="true" style="flex:1; display:block;">${val}</span>
                <div style="display:flex; gap:5px;">
                    <button class="btn-inline-add" onclick="addSpecificSubPart(this)" title="Add Part (a,b..)"
                            style="background:#e3f2fd; border:1px solid #2196f3; color:#2196f3; width:30px; border-radius:4px; position:static;">(a)</button>
                    <button class="btn-inline-add" onclick="addSibling(this)" title="Add New Question"
                            style="background:#e8f5e9; border:1px solid #2ecc71; color:#2ecc71; width:30px; border-radius:4px; position:static;">+</button>
                    <button class="btn-row-del" onclick="removeRow(this)"
                            style="background:#ffebee; border:1px solid #f44336; color:#f44336; width:30px; border-radius:4px;">×</button>
                </div>
            </div>
            <div class="sub-container" style="margin-left:30px; border-left: 2px solid #f0f0f0; padding-left: 10px;"></div>
        `;

        const subCont = wrapper.querySelector('.sub-container');
        if (subparts.length > 0) {
        subparts.forEach((sp, idx) => addSubPart(subCont, sp, String.fromCharCode(97 + idx)));
    }
        container.appendChild(wrapper);
        renumberQuestions(container);
    }

        function addSpecificSubPart(btn) {
        const wrapper = btn.closest('.q-row-wrapper');
        const subCont = wrapper.querySelector('.sub-container');
        addSubPart(subCont, "");
        showNotify("Part Added to Question", "green");
    }

        function togglePartsVisibility(checkbox) {
        const block = checkbox.closest('.question-block');
        const containers = block.querySelectorAll('.sub-container');
        containers.forEach(container => {
        if (checkbox.checked) {
        if (container.children.length === 0) {
        addSubPart(container, "", "a");
        addSubPart(container, "", "b");
    }
        container.style.display = 'block';
    } else {
        container.style.display = 'none';
    }
    });
    }

        function removeRow(btn) {
        const row = btn.closest('.q-row-wrapper');
        const container = row.parentElement;
        row.remove();
        renumberQuestions(container);
        showNotify("Question Removed", "red");
    }

        function renumberQuestions(container) {
        container.querySelectorAll('.q-row-wrapper').forEach((wrapper, i) => {
            wrapper.querySelector('.q-num').innerText = (i + 1) + ".";
        });
    }

        function addSibling(btn) {
        const container = btn.closest('.q-container');
        const index = container.querySelectorAll('.q-row-wrapper').length + 1;
        createNewQuestionRow(container, index);
    }

    function addSubPart(container, val = "", label = null) {
        const count = container.children.length;
        const char = label || String.fromCharCode(97 + count);
        const div = document.createElement('div');
        div.className = 'sub-part-row';

        // Logic: If it's an MCQ section, make options inline
        const isMCQ = container.closest('.question-block').dataset.type === 'MCQs';

        div.style.display = isMCQ ? 'inline-flex' : 'flex';
        div.style.width = isMCQ ? '45%' : '100%';
        div.style.gap = '5px';
        div.style.marginTop = '8px';
        div.style.alignItems = 'center';

        div.innerHTML = `
        <span style="font-size:12px; font-weight:600;">(${char})</span>
       <span class="sub-input q-input" contenteditable="true" style="flex:1; display:block;">${val}</span>
        <button class="btn-row-del" onclick="this.parentElement.remove()" style="border:none; background:none; color:red; font-weight:bold; padding:0 5px;">×</button>
    `;
        container.appendChild(div);
    }

    async function saveToVault() {
        const btn = document.getElementById('btn-save');
        btn.innerText = "SAVING..."; btn.disabled = true;

        const blueprint = [];
        let grandTotal = 0;

        // 🔥 FIX: Query all question blocks across ALL pages
        document.querySelectorAll('.paper-page .question-block').forEach(block => {
            const questions = [];
            block.querySelectorAll('.q-row-wrapper').forEach(wrapper => {
                const mainQ = wrapper.querySelector('.part-row .q-input').innerText; // Use innerText
                const subQs = Array.from(wrapper.querySelectorAll('.sub-input')).map(si => si.innerText); // Use innerText
                questions.push({ text: mainQ, sub_parts: subQs });
            });

            const m = parseInt(block.dataset.marks) || 0;
            const c = parseInt(block.dataset.choice) || 0;
            grandTotal += (m * c);

            blueprint.push({
                type: block.dataset.type,
                marks_per_q: m,
                choice: c,
                questions: questions
            });
        });

        const payload = {
            institution: document.getElementById('p-inst-name').value,
            subject: document.getElementById('p-subject').value,
            target_class: document.getElementById('p-class').value,
            paper_type: document.getElementById('p-type').value,
            duration: document.getElementById('p-duration').value,
            language: document.getElementById('sel-lang').value,
            blueprint: blueprint,
            total_marks: grandTotal
        };

        const url = currentEditId ? `${API_URL}/document/papers/save-vault?paper_id=${currentEditId}` : `${API_URL}/document/papers/save-vault`;

        try {
            const tRes = await AppStorage.get("auth_token");
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${tRes.value || tRes}` },
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                showNotify("Paper Secured", "green");
                setTimeout(() => location.reload(), 1200);
            } else {
                showNotify("Save Failed", "red");
                btn.disabled = false; btn.innerText = "SAVE TO VAULT";
            }
        } catch(e) {
            showNotify("Network Error", "red");
            btn.disabled = false;
        }
    }

        async function fetchVault() {
        const container = document.getElementById('vault-list-container');
        container.innerHTML = "Syncing...";
        try {
        const tRes = await AppStorage.get("auth_token");
        const res = await fetch(`${API_URL}/document/papers/vault-list`, {
        headers: { 'Authorization': `Bearer ${tRes.value || tRes}` }
    });
        vaultData = await res.json();
        container.innerHTML = vaultData.map(p => `
                <div class="vault-card">
                    <span class="status-badge">${p.status}</span>
                    <b style="font-size:12px;">${p.subject.toUpperCase()}</b>
                    <small>${p.target_class} | ${p.paper_type}</small>
                    <div class="card-actions" style="grid-template-columns: 1fr; gap: 4px;">
                        <button class="btn-card" style="background:var(--primary); color:white;" onclick="processPrint(${p.id})">PRINT</button>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;">
                            <button class="btn-card btn-edit" onclick="loadEdit(${p.id})">EDIT</button>
                            <button class="btn-card btn-del" onclick="confirmDelete(${p.id})">DEL</button>
                        </div>
                    </div>
                </div>
            `).join('');
    } catch(e) { container.innerHTML = "Sync Failed."; }
    }

    function loadEdit(id) {
        const p = vaultData.find(x => x.id === id);
        if(!p) return;
        currentEditId = p.id;
        switchTab('design');

        // Reset Pages to Start Fresh
        document.getElementById('pages-container').innerHTML = `
        <div class="paper-page active-page" id="page-1">
            <div class="paper-header">
                <input type="text" class="editable-inst" value="${p.institution}" id="p-inst-name">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; font-size: 11px; margin-top:10px;">
                    <div>SUB: <input type="text" id="p-subject" class="editable-head" value="${p.subject}"></div>
                    <div>CLASS: <select id="p-class" class="editable-head" style="width:60%;"></select></div>
                    <div>TYPE: <input type="text" id="p-type" class="editable-head" value="${p.paper_type}"></div>
                    <div>TIME: <input type="text" id="p-duration" class="editable-head" value="${p.duration}"></div>
                </div>
            </div>
            <div id="dynamic-content-p1"></div>
        </div>
    `;
        totalPages = 1;
        currentPage = 1;
        loadSections(); // Refresh dropdown

        document.getElementById('btn-save').innerText = "UPDATE SECURED PAPER";
        document.getElementById('sel-lang').value = p.language;
        toggleLangLayout();

        // Re-build sections across pages
        const blueprintData = p.content_blueprint || p.blueprint;
        blueprintData.forEach(sec => {
            activeType = sec.type;
            // Logic to add section while respecting page breaks
            let targetContentArea = document.getElementById(`dynamic-content-p${totalPages}`);
            const block = document.createElement('div');
            block.className = 'question-block';
            block.dataset.marks = sec.marks_per_q;
            block.dataset.choice = sec.choice;
            block.dataset.type = sec.type;

            block.innerHTML = `
            <div class="q-header-row">
                <span>${sec.type}</span>
                <span class="marks-label">(${sec.choice * sec.marks_per_q} Marks)</span>
            </div>
            <div class="q-container"></div>
        `;
            targetContentArea.appendChild(block);

            const qCont = block.querySelector('.q-container');
            sec.questions.forEach((qObj, idx) => {
                const text = typeof qObj === 'string' ? qObj : qObj.text;
                const subs = qObj.sub_parts || [];
                createNewQuestionRow(qCont, idx + 1, text, subs);
                // Check if adding this question caused a page overflow
                checkAndHandleOverflow(block);
            });
        });
        showPage(1); // Return to first page after loading
        showNotify("Editor Hydrated", "green");
    }

        function confirmDelete(id) {
        document.getElementById('confirm-box').style.display = 'flex';
        document.getElementById('final-del-btn').onclick = () => performDelete(id);
    }
        function closeConfirm() { document.getElementById('confirm-box').style.display = 'none'; }
        async function performDelete(id) {
        const tRes = await AppStorage.get("auth_token");
        const res = await fetch(`${API_URL}/document/papers/delete/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${tRes.value || tRes}` }
    });
        if(res.ok) { showNotify("Removed", "green"); closeConfirm(); fetchVault(); }
    }
        function showNotify(msg, type) {
        const bar = document.getElementById('notification-bar');
        bar.innerText = msg; bar.className = 'bg-' + type;
        setTimeout(() => bar.className = "", 3000);
    }
    async function processPrint(id) {
        const paper = vaultData.find(p => p.id === id);
        if(!paper) return;

        showNotify("Compiling Pages for Export...", "green");

        if(currentEditId !== id) {
            await loadEdit(id);
        }

        // Target the entire container holding all A4 pages
        const element = document.getElementById('pages-container');

        // Show ALL pages for the PDF generator
        const allPages = document.querySelectorAll('.paper-page');
        allPages.forEach(p => p.style.display = 'block');
        element.classList.add('exporting-pdf');

        const opt = {
            margin: 0,
            filename: `${paper.subject}_Paper.pdf`,
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 2, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
        };

        try {
            const worker = html2pdf().set(opt).from(element);
            const pdfBase64 = await worker.outputPdf('datauristring');

            // Hide non-active pages again
            showPage(currentPage);
            element.classList.remove('exporting-pdf');

            await shareToDevice(pdfBase64, opt.filename);
            await finalizePaperStatus(id);
            fetchVault();
        } catch (e) {
            showPage(currentPage);
            element.classList.remove('exporting-pdf');
            showNotify("Export failed", "red");
        }
    }

        // Helper function to talk to the new PUT route
        async function finalizePaperStatus(id) {
            try {
                const tRes = await AppStorage.get("auth_token");
                const res = await fetch(`${API_URL}/document/papers/mark-taken/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${tRes.value || tRes}` }
                });
                return res.ok;
            } catch (e) {
                console.error("Archive error:", e);
                return false;
            }
        }
        // 🏛️ The Native Sharing Bridge
        async function shareToDevice(base64Data, fileName) {
            try {
                const { Filesystem } = Capacitor.Plugins;
                const { Share } = Capacitor.Plugins;

                // Clean the base64 string for saving
                const base64Content = base64Data.split(',')[1];

                // Save to Temporary App Cache
                const saveResult = await Filesystem.writeFile({
                    path: fileName,
                    data: base64Content,
                    directory: 'CACHE' // Better than 'Documents' for temporary sharing
                });

                // Open the Native Share Dialog (WhatsApp, Email, Printing)
                await Share.share({
                    title: 'Institution Exam Paper',
                    text: 'Official paper generated via Starlight Console.',
                    url: saveResult.uri,
                    dialogTitle: 'Export Exam Paper'
                });

            } catch (err) {
                console.error("Native Share Error:", err);
                // Fallback for web testing
                const link = document.createElement('a');
                link.href = base64Data;
                link.download = fileName;
                link.click();
            }
        }

    function changePage(step) {
        const newPage = currentPage + step;
        if (newPage >= 1 && newPage <= totalPages) {
            showPage(newPage);
        }
    }

        function goToPage(target) {
            if (target === 'first') showPage(1);
            if (target === 'last') showPage(totalPages);
        }

    function createNewPage() {
        totalPages++;
        const container = document.getElementById('pages-container');
        const newDiv = document.createElement('div');
        newDiv.className = 'paper-page';
        newDiv.id = `page-${totalPages}`;
        // Pages after Page 1 do NOT get the paper-header
        newDiv.innerHTML = `<div id="dynamic-content-p${totalPages}"></div>`;
        container.appendChild(newDiv);

        document.getElementById('total-pages-num').innerText = totalPages;
        return newDiv;
    }

    function manualCreatePage() {
        totalPages++;
        const container = document.getElementById('pages-container');
        const newDiv = document.createElement('div');
        newDiv.className = 'paper-page';
        newDiv.id = `page-${totalPages}`;
        // Pages after Page 1 do NOT get the paper-header automatically
        newDiv.innerHTML = `<div id="dynamic-content-p${totalPages}" style="min-height: 100px;"></div>`;
        container.appendChild(newDiv);

        document.getElementById('total-pages-num').innerText = totalPages;
        showPage(totalPages); // Move to the new page immediately
        showNotify("New Page Created", "green");
    }

    // 🔥 NEW: Manually delete the current page (with safety)
    function manualDeletePage() {
        if (totalPages === 1) {
            showNotify("Cannot delete the first page", "red");
            return;
        }

        const pageToDelete = document.getElementById(`page-${currentPage}`);
        if (pageToDelete) {
            pageToDelete.remove();

            // Re-calculate totals and IDs
            const remainingPages = document.querySelectorAll('.paper-page');
            totalPages = remainingPages.length;

            // Re-ID all pages to keep sequence correct
            remainingPages.forEach((pg, index) => {
                const newIdx = index + 1;
                pg.id = `page-${newIdx}`;
                const content = pg.querySelector('[id^="dynamic-content-p"]');
                if(content) content.id = `dynamic-content-p${newIdx}`;
            });

            document.getElementById('total-pages-num').innerText = totalPages;
            showPage(Math.max(1, currentPage - 1));
            showNotify("Page Removed", "red");
        }
    }

    // 🔥 MODIFIED: Ensure switchTab/loadEdit respects manual page logic
    function showPage(num) {
        document.querySelectorAll('.paper-page').forEach(p => p.classList.remove('active-page'));
        const target = document.getElementById(`page-${num}`);
        if (target) {
            target.style.display = 'block'; // Ensure it's visible
            target.classList.add('active-page');
            currentPage = num;
            document.getElementById('current-page-num').innerText = currentPage;
        }
    }

    function cleanupEmptyPages() {
        if (totalPages <= 1) return;

        const lastPage = document.getElementById(`page-${totalPages}`);
        const content = document.getElementById(`dynamic-content-p${totalPages}`);

        if (content && content.children.length === 0) {
            lastPage.remove();
            totalPages--;
            document.getElementById('total-pages-num').innerText = totalPages;
            if (currentPage > totalPages) showPage(totalPages);
        }
    }

</script>
