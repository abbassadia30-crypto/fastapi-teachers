<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Super Console | Voucher Architect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #1b5e20; --bg: #455a64; --border: #000; }
    * { box-sizing: border-box; -webkit-print-color-adjust: exact; }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    /* 🏛️ Landscape 3-Copy Wrapper */
    .page-landscape {
      display: flex;
      flex-direction: row;
      width: 297mm; /* A4 Landscape Width */
      background: white;
      padding: 10mm;
      gap: 5mm;
      box-shadow: 0 10px 50px rgba(0,0,0,0.5);
      min-height: 210mm;
    }

    .voucher-copy {
      flex: 1;
      border: 1.5px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      padding: 0;
      overflow: hidden;
    }

    /* 🏛️ Header Section */
    .v-header-top {
      background: #000; color: #fff; text-align: center;
      font-weight: 900; text-transform: uppercase; font-size: 14px; padding: 5px;
    }

    .inst-branding {
      display: flex;
      padding: 8px;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #000;
    }
    .logo-placeholder {
      width: 45px; height: 45px; border: 1px dashed #999;
      display: flex; align-items: center; justify-content: center; font-size: 8px; color: #999;
    }
    .inst-name { flex: 1; font-weight: 900; font-size: 14px; text-transform: uppercase; outline: none; }

    .v-copy-tag {
      font-size: 9px; font-weight: 800; text-align: center;
      background: #eee; border-bottom: 1px solid #000; padding: 2px;
    }

    /* 🏛️ Data Grids */
    .v-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      font-size: 10px;
      border-bottom: 1px solid #000;
    }
    .v-meta-grid div { padding: 4px; border-right: 1px solid #000; border-bottom: 0.5px solid #eee; }
    .v-meta-grid div:nth-child(2n) { border-right: none; }

    .student-name-bar {
      padding: 6px; font-weight: 800; text-align: center;
      background: #f9f9f9; border-bottom: 1px solid #000; font-size: 12px;
      text-transform: uppercase; outline: none;
    }

    /* 🏛️ Table Logic */
    .v-table { width: 100%; border-collapse: collapse; flex: 1; }
    .v-table th { font-size: 9px; background: #eee; border-bottom: 1px solid #000; border-right: 1px solid #000; padding: 5px; text-align: left; }
    .v-table td { font-size: 10px; border-bottom: 1px solid #ddd; border-right: 1px solid #000; padding: 5px; outline: none; }
    .v-table td:last-child, .v-table th:last-child { border-right: none; }

    .v-total-row { font-weight: 900; background: #eee; border-top: 1.5px solid #000; }

    /* 🏛️ Late Fee & Footer */
    .late-fee-section { background: #eee; font-size: 9px; font-weight: 800; border-top: 1px solid #000; padding: 4px; text-align: center; }
    .payment-info { padding: 8px; font-size: 9px; line-height: 1.4; border-top: 1px solid #000; min-height: 50px; }

    .v-footer {
      background: #000; color: #fff; padding: 5px; font-size: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }

    /* 🏛️ Super Console Action Bar */
    .action-bar {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.95); padding: 10px 20px; border-radius: 50px;
      display: flex; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000;
    }
    .btn-action {
      border: none; padding: 10px 18px; border-radius: 25px; font-weight: 800;
      cursor: pointer; font-size: 12px; transition: 0.3s; display: flex; align-items: center; gap: 8px;
    }
    .btn-mode { background: #2196F3; color: white; }
    .btn-add { background: #ff9800; color: white; }
    .btn-save { background: var(--primary); color: white; }

    [contenteditable="true"]:hover { background: #fffde7; cursor: text; }

    @media print {
      .no-print { display: none; }
      body { background: white; padding: 0; }
      .page-landscape { box-shadow: none; margin: 0; transform: scale(1); width: 100%; }
    }
  </style>
</head>
<body onload="initArchitect()">

<div class="action-bar no-print">
  <button class="btn-action btn-mode" onclick="toggleDocType()">
    🔄 SWITCH: <span id="current-mode-label">VOUCHER</span>
  </button>
  <button class="btn-action btn-add" onclick="addNewRow()">
    ➕ INTERACTIVE ROW
  </button>
  <button class="btn-action btn-save" onclick="saveToVault()">
    💾 SAVE TO VAULT
  </button>
  <button class="btn-action" style="background:#000; color:#fff;" onclick="window.print()">
    🖨️ PRINT
  </button>
</div>

<div class="page-landscape" id="architect-wrapper">
</div>

<script>
  let docType = 'voucher';
  let institutionName = "LOADING...";

  async function initArchitect() {
    try {
      const data = await AppStorage.get("active_institution");
      institutionName = data?.name || "PAK-NATIONAL INSTITUTION";
    } catch(e) { institutionName = "PAK-NATIONAL INSTITUTION"; }
    renderDocument();
  }

  function toggleDocType() {
    docType = docType === 'voucher' ? 'receipt' : 'voucher';
    document.getElementById('current-mode-label').innerText = docType.toUpperCase();
    renderDocument();
  }

  function renderDocument() {
    const wrap = document.getElementById('architect-wrapper');
    const copies = docType === 'voucher' ? ["BANK COPY", "OFFICE COPY", "STUDENT COPY"] : ["OFFICIAL RECORD"];

    wrap.innerHTML = copies.map(copyTitle => generateLeaf(copyTitle)).join('');
  }

  function generateLeaf(copyTitle) {
    const isV = docType === 'voucher';
    return `
            <div class="voucher-copy">
                <div class="v-header-top" contenteditable="true">${isV ? 'Fee Bill' : 'Salary Slip'}</div>
                <div class="inst-branding">
                    <div class="logo-placeholder">LOGO</div>
                    <div class="inst-name" contenteditable="true">${institutionName}</div>
                </div>
                <div class="v-copy-tag" contenteditable="true">${copyTitle}</div>

                <div class="v-meta-grid">
                    <div><b>${isV ? 'Invoice #' : 'Slip #'}</b></div><div contenteditable="true">---</div>
                    <div><b>Date</b></div><div contenteditable="true">${new Date().toLocaleDateString()}</div>
                    <div><b>Due Date</b></div><div contenteditable="true">10-Mar-2026</div>
                </div>

                <div class="student-name-bar" contenteditable="true">MANUAL NAME ENTRY</div>

                <div class="v-meta-grid">
                    <div><b>${isV ? 'Student ID' : 'Staff ID'}</b></div><div contenteditable="true" style="font-weight:900">000000</div>
                    <div><b>${isV ? 'Program' : 'Designation'}</b></div><div contenteditable="true">---</div>
                    <div style="border-bottom:none"><b>Term/Month</b></div><div style="border-bottom:none" contenteditable="true">March 2026</div>
                </div>

                <table class="v-table">
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th style="text-align:right">Amount (Rs.)</th>
                        </tr>
                    </thead>
                    <tbody class="data-rows">
                        <tr>
                            <td contenteditable="true">${isV ? 'Tuition Fee' : 'Basic Salary'}</td>
                            <td contenteditable="true" style="text-align:right">0</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr class="v-total-row">
                            <td>TOTAL PAYABLE</td>
                            <td style="text-align:right" contenteditable="true">0</td>
                        </tr>
                    </tfoot>
                </table>

                ${isV ? `
                <div style="padding:4px; border-top:1px solid #000; font-size:9px;"><b>In Words:</b> <br> <span contenteditable="true">Zero Rupees Only</span></div>
                <div class="late-fee-section">PAYABLES AFTER DUE DATE</div>
                <div class="v-meta-grid">
                    <div>Late S1 (11th-20th)</div><div style="text-align:right" contenteditable="true">0</div>
                    <div style="border-bottom:none">Late S2 (21st onwards)</div><div style="border-bottom:none; text-align:right" contenteditable="true">0</div>
                </div>
                ` : `
                <div style="padding:4px; border-top:1px solid #000; font-size:9px;"><b>Payment Status:</b> <br> <span contenteditable="true">Pending Disbursement</span></div>
                <div style="margin-top:20px; display:flex; justify-content:space-around; padding-bottom:10px;">
                    <div style="border-top:1px solid #000; width:80px; text-align:center; font-size:8px;">Receiver</div>
                    <div style="border-top:1px solid #000; width:80px; text-align:center; font-size:8px;">Authorized</div>
                </div>
                `}

                <div class="payment-info" contenteditable="true">
                    <b>Information:</b><br>
                    Enter Bank Name, Account Number, or Terms & Conditions here...
                </div>

                <div class="v-footer">
                    <span>Generated via Institution Console</span>
                    <span>📞 0000-0000000</span>
                </div>
            </div>`;
  }

  function addNewRow() {
    const rows = document.querySelectorAll('.data-rows');
    rows.forEach(tbody => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td contenteditable="true">New Item</td><td contenteditable="true" style="text-align:right">0</td>`;
      tbody.appendChild(tr);
    });
  }

  function saveToVault() {
    // Real App Logic: Serialize the content and send to FastAPI
    console.log("Saving state to Central Vault...");
    // Trigger your red/green sign box here
  }

  // Mock AppStorage
  if (typeof AppStorage === 'undefined') {
    window.AppStorage = { get: async () => ({name: "Pak-National High School"}) };
  }
</script>
</body>
</html>
