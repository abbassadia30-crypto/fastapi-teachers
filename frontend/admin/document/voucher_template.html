<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Professional Template Architect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #1b5e20; --bg: #546e7a; --border-bold: #000; }
    body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }

    /* 🏛️ UI Containers */
    .sidebar { width: 350px; background: white; border-right: 2px solid #ccc; overflow-y: auto; padding: 20px; flex-shrink: 0; }
    .preview-area { flex: 1; overflow: auto; padding: 40px; display: flex; flex-direction: column; align-items: center; }

    .config-card { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ddd; }
    label { font-size: 10px; font-weight: 900; color: #666; text-transform: uppercase; display: block; margin-bottom: 5px; }
    input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 12px; box-sizing: border-box; }

    /* 📑 The Professional Triple-Copy Voucher */
    .triple-container { display: flex; gap: 10px; background: white; padding: 10px; border: 1px solid #000; min-width: 1000px; }
    .voucher-copy { flex: 1; border: 1px solid #000; display: flex; flex-direction: column; font-size: 10px; position: relative; }

    /* Header Section */
    .v-header-top { border-bottom: 1px solid #000; text-align: center; font-weight: 900; padding: 2px; font-size: 11px; }
    .v-copy-tag { border-bottom: 1px solid #000; text-align: center; font-weight: 700; padding: 2px; background: #f0f0f0; }

    .v-meta-grid { display: grid; grid-template-columns: 1fr 1.5fr; border-bottom: 1px solid #000; }
    .v-meta-grid div { padding: 4px; border-right: 1px solid #000; border-bottom: 1px solid #000; }

    /* Table Section */
    .v-table { width: 100%; border-collapse: collapse; flex-grow: 1; }
    .v-table th { border: 1px solid #000; padding: 4px; text-align: left; background: #eee; }
    .v-table td { border-left: 1px solid #000; border-right: 1px solid #000; padding: 4px; height: 20px; }
    .v-total-row { border: 1px solid #000; font-weight: 900; background: #f9f9f9; }

    /* Payment Info Section */
    .payment-info { border: 1px solid #000; padding: 5px; font-size: 9px; line-height: 1.2; }
    .v-footer { background: #000; color: white; padding: 5px; text-align: center; font-size: 9px; font-weight: 700; }

    .btn-deploy { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  </style>
</head>
<body>

<div class="sidebar">
  <h3 style="margin-top:0">Architect Console</h3>

  <div class="config-card">
    <label>Institution Name</label>
    <input type="text" id="inst-name" placeholder="National University..." oninput="sync()">
    <label>Academic Program/Term</label>
    <input type="text" id="term-info" placeholder="Fall Semester 2026" oninput="sync()">
  </div>

  <div class="config-card">
    <label>Fee Heads</label>
    <div id="heads-cont">
      <div style="display:flex; gap:5px; margin-bottom:5px;">
        <input type="text" class="h-name" value="Tuition Fee" oninput="sync()">
        <input type="number" class="h-amount" value="65000" oninput="sync()" style="width:80px;">
      </div>
    </div>
    <button onclick="addHead()" style="font-size:10px; font-weight:800; border:none; background:none; color:var(--primary); cursor:pointer;">+ ADD HEAD</button>
  </div>

  <div class="config-card">
    <label>Late Fee Slabs (PKR)</label>
    <input type="number" id="late-1" placeholder="Between 6th-20th" value="1500" oninput="sync()">
    <input type="number" id="late-2" placeholder="21st onwards" value="3000" oninput="sync()">
  </div>

  <div class="config-card">
    <label>Bank Account Details</label>
    <textarea id="bank-info" oninput="sync()" style="height:60px;">Payable through Internet Banking / Mobile App. Main Collection A/C: 0042-79000877-03</textarea>
  </div>
</div>

<div class="preview-area">
  <div class="triple-container" id="voucher-wrap">
  </div>
</div>

<button class="btn-deploy" onclick="saveTemplate()">💾 SAVE INSTITUTION BLUEPRINT</button>

<script>
  function addHead() {
    const div = document.createElement('div');
    div.style = "display:flex; gap:5px; margin-bottom:5px;";
    div.innerHTML = `<input type="text" class="h-name" oninput="sync()"><input type="number" class="h-amount" oninput="sync()" style="width:80px;">`;
    document.getElementById('heads-cont').appendChild(div);
  }

  function sync() {
    const wrap = document.getElementById('voucher-wrap');
    const inst = document.getElementById('inst-name').value || "YOUR INSTITUTION NAME";
    const term = document.getElementById('term-info').value || "ACADEMIC TERM";
    const bank = document.getElementById('bank-info').value;
    const l1 = parseFloat(document.getElementById('late-1').value) || 0;
    const l2 = parseFloat(document.getElementById('late-2').value) || 0;

    const copies = ["Student Copy", "Institution Copy", "Bank Copy"];

    let headRows = "";
    let subTotal = 0;
    document.querySelectorAll('#heads-cont > div').forEach(div => {
      const n = div.querySelector('.h-name').value;
      const a = parseFloat(div.querySelector('.h-amount').value) || 0;
      if(n) {
        headRows += `<tr><td>${n}</td><td style="text-align:right">${a.toLocaleString()}</td></tr>`;
        subTotal += a;
      }
    });

    wrap.innerHTML = copies.map(copyTitle => `
            <div class="voucher-copy">
                <div class="v-header-top">Fee Bill</div>
                <div class="v-copy-tag">${copyTitle}</div>
                <div class="v-meta-grid">
                    <div><b>Invoice #</b></div><div>00000000000000065658</div>
                    <div><b>Invoice Date</b></div><div>26-Feb-2026</div>
                    <div><b>Due Date</b></div><div>10-Mar-2026</div>
                </div>
                <div style="border-bottom:1px solid #000; padding:4px; font-weight:800; text-align:center; background:#eee;">MUHAMMAD KAMAL AHMAD</div>
                <div class="v-meta-grid">
                    <div><b>Student ID</b></div><div style="font-weight:900">00000171089</div>
                    <div><b>Program</b></div><div>MS ENGINEERING</div>
                    <div style="border-bottom:none"><b>Term</b></div><div style="border-bottom:none">${term}</div>
                </div>
                <table class="v-table">
                    <thead><tr><th>Description</th><th style="text-align:right">Amount (Rs.)</th></tr></thead>
                    <tbody>
                        ${headRows}
                        <tr class="v-total-row"><td>Payables within Due Date</td><td style="text-align:right">${subTotal.toLocaleString()}</td></tr>
                    </tbody>
                </table>
                <div style="padding:4px; border-top:1px solid #000;"><b>In Words:</b> <br> ${numberToWords(subTotal)} only.</div>
                <div style="background:#eee; padding:2px; font-weight:800; border-top:1px solid #000;">Payables after Due Date</div>
                <div class="v-meta-grid">
                    <div>Between 11-Mar to 20-Mar</div><div style="text-align:right">${(subTotal + l1).toLocaleString()}</div>
                    <div style="border-bottom:none">21-Mar and onwards</div><div style="border-bottom:none; text-align:right">${(subTotal + l2).toLocaleString()}</div>
                </div>
                <div class="payment-info">
                    <b>Payment Information:</b><br>${bank}
                </div>
                <div class="v-footer">${inst}</div>
            </div>
        `).join('');
  }

  function numberToWords(num) {
    // Simple logic for preview purposes
    return "Sixty-five thousand eight hundred";
  }

  async function saveTemplate() {
    // Logic to send JSON to @router.post("/finance/template/save")
    alert("Template Logic Saved Successfully");
  }

  window.onload = sync;
</script>
</body>
</html>
