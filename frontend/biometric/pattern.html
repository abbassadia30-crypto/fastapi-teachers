<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Identity Check | Institution</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #22c55e; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; touch-action: none; }

        #sign { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 16px; border-radius: 12px; width: 80%; text-align: center; font-weight: 600; transition: 0.5s; z-index: 1000; }
        .active-sign { top: 20px !important; }

        #canvas-box { background: var(--card); border-radius: 40px; padding: 10px; border: 1px solid #334155; }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { color: var(--primary); letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="sign"></div>

<div class="header">
    <h2 id="gate-title">Super Console</h2>
    <p style="color: #94a3b8;">Draw pattern to unlock</p>
</div>

<div id="canvas-box">
    <canvas id="canvas" width="320" height="320"></canvas>
</div>

<script src="../js/storage.js"></script>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dots = [], path = [], isDrawing = false, storedPattern = "", userRole = "";

    async function init() {
        const [p, r] = await Promise.all([AppStorage.get('local_pattern'), AppStorage.get('user_role')]);
        storedPattern = atob(p); userRole = r || 'admin';

        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                dots.push({ x: j * 100 + 60, y: i * 100 + 60, id: i * 3 + j, row: i, col: j });
            }
        }
        draw();
    }

    function getJumpedDots(lastId, nextId) {
        const last = dots[lastId], next = dots[nextId];
        const mR = (last.row + next.row) / 2, mC = (last.col + next.col) / 2;
        if (Number.isInteger(mR) && Number.isInteger(mC)) {
            const mD = dots.find(d => d.row === mR && d.col === mC);
            return mD && !path.includes(mD.id) ? mD.id : null;
        }
        return null;
    }

    function draw(mx, my) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (path.length > 0) {
            ctx.beginPath(); ctx.lineWidth = 10; ctx.strokeStyle = '#38bdf8'; ctx.lineCap = 'round';
            ctx.moveTo(dots[path[0]].x, dots[path[0]].y);
            path.forEach(id => ctx.lineTo(dots[id].x, dots[id].y));
            if (isDrawing && mx) ctx.lineTo(mx, my);
            ctx.stroke();
        }
        dots.forEach(d => {
            const active = path.includes(d.id);
            ctx.beginPath(); ctx.arc(d.x, d.y, active ? 14 : 10, 0, Math.PI*2);
            ctx.fillStyle = active ? '#38bdf8' : '#334155';
            ctx.fill();
        });
    }

    const handleMove = (e) => {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX - rect.left, y = ev.clientY - rect.top;

        dots.forEach(d => {
            const dist = Math.sqrt((x - d.x)**2 + (y - d.y)**2);
            if (dist < 30 && !path.includes(d.id)) { // 🧲 Magnetic Attraction
                if (path.length > 0) {
                    const jumped = getJumpedDots(path[path.length - 1], d.id);
                    if (jumped !== null) path.push(jumped);
                }
                path.push(d.id);
                if (window.Capacitor) Capacitor.Plugins.Haptics.impact({ style: 'LIGHT' });
            }
        });
        draw(x, y);
    };

    const handleEnd = async () => {
        if (!isDrawing) return;
        isDrawing = false;
        if (path.join('') === storedPattern) {
            showSign("Access Granted", "success");

            setTimeout(() => {
                const folder = (userRole === 'owner' || userRole === 'admin') ? 'admin' : userRole;
                window.location.replace(`../${folder}/dashboard/dashboard.html`);
            }, 800);
        } else {
            showSign("Wrong Pattern", "error");
            document.getElementById('canvas-box').classList.add('shake');
            setTimeout(() => document.getElementById('canvas-box').classList.remove('shake'), 400);
            path = []; draw();
        }
    };

    function showSign(m, t) {
        const s = document.getElementById('sign'); s.innerText = m;
        s.style.background = t === 'success' ? '#22c55e' : '#ef4444';
        s.classList.add('active-sign');
        setTimeout(() => s.classList.remove('active-sign'), 2500);
    }

    canvas.addEventListener('touchstart', (e) => { isDrawing = true; path = []; e.preventDefault(); }, {passive: false});
    window.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('touchend', handleEnd);
    init();
</script>
</body>
</html>
