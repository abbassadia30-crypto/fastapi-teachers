<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Setup Security | Institution</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --danger: #ef4444; --success: #22c55e; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; touch-action: none; }

        #sign { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 16px; border-radius: 12px; width: 80%; text-align: center; font-weight: 600; transition: 0.5s; z-index: 1000; }
        .active-sign { top: 20px !important; }

        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: var(--primary); margin: 0; }

        #canvas-box { background: var(--card); border-radius: 40px; padding: 10px; border: 1px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        canvas { touch-action: none; border-radius: 30px; }

        .btn-row { margin-top: 30px; width: 280px; }
        .p-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; background: var(--primary); color: #0f172a; }
    </style>
</head>
<body>

<div id="sign"></div>

<div class="header">
    <h2 id="msg">Draw New Pattern</h2>
    <p id="sub-msg">At least 4 dots required</p>
</div>

<div id="canvas-box">
    <canvas id="canvas" width="320" height="320"></canvas>
</div>

<div class="btn-row">
    <button class="p-btn" onclick="location.reload()" style="background: rgba(255,255,255,0.1); color: white;">Reset Setup</button>
</div>

<script src="../js/storage.js"></script>
<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dots = [], path = [], isDrawing = false, mode = "CREATE", tempPattern = "";

    function init() {
        dots = [];
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                dots.push({ x: j * 100 + 60, y: i * 100 + 60, id: i * 3 + j, row: i, col: j });
            }
        }
        draw();
    }

    // 🏛️ The "Perfect" Logic: Check for jumped dots (e.g., 0 to 2 catches 1)
    function getJumpedDots(lastId, nextId) {
        const last = dots[lastId], next = dots[nextId];
        const midRow = (last.row + next.row) / 2, midCol = (last.col + next.col) / 2;
        if (Number.isInteger(midRow) && Number.isInteger(midCol)) {
            const midDot = dots.find(d => d.row === midRow && d.col === midCol);
            return midDot && !path.includes(midDot.id) ? midDot.id : null;
        }
        return null;
    }

    function draw(mx, my) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (path.length > 0) {
            ctx.beginPath();
            ctx.lineWidth = 10; ctx.strokeStyle = '#38bdf8'; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.moveTo(dots[path[0]].x, dots[path[0]].y);
            path.forEach(id => ctx.lineTo(dots[id].x, dots[id].y));
            if (isDrawing && mx) ctx.lineTo(mx, my);
            ctx.stroke();
        }
        dots.forEach(d => {
            const active = path.includes(d.id);
            ctx.beginPath(); ctx.arc(d.x, d.y, active ? 15 : 10, 0, Math.PI*2);
            ctx.fillStyle = active ? '#38bdf8' : '#334155';
            if(active) { ctx.shadowBlur = 15; ctx.shadowColor = '#38bdf8'; }
            ctx.fill(); ctx.shadowBlur = 0;
        });
    }

    const handleMove = (e) => {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX - rect.left, y = ev.clientY - rect.top;

        dots.forEach(d => {
            const dist = Math.sqrt((x - d.x)**2 + (y - d.y)**2);
            if (dist < 30 && !path.includes(d.id)) { // 🧲 Magnetic Attraction Radius
                if (path.length > 0) {
                    const jumped = getJumpedDots(path[path.length - 1], d.id);
                    if (jumped !== null) path.push(jumped);
                }
                path.push(d.id);
                if (window.Capacitor) Capacitor.Plugins.Haptics.impact({ style: 'LIGHT' });
            }
        });
        draw(x, y);
    };

    const handleEnd = async () => {
        isDrawing = false;
        const pattern = path.join('');
        if (pattern.length < 4) {
            showSign("Too short!", "error"); path = []; draw(); return;
        }

        if (mode === "CREATE") {
            tempPattern = pattern; mode = "CONFIRM";
            document.getElementById('msg').innerText = "Confirm Pattern";
            showSign("Draw again to confirm", "success");
        } else {
            if (pattern === tempPattern) {
                await AppStorage.set('local_pattern', btoa(pattern));
                await AppStorage.set('security_type', 'pattern');
                showSign("Pattern Saved Successfully", "success");
                setTimeout(() => window.location.href = "security.html", 1200);
            } else {
                showSign("Mismatch! Starting over", "error");
                mode = "CREATE"; document.getElementById('msg').innerText = "Draw New Pattern";
            }
        }
        path = []; draw();
    };

    function showSign(m, t) {
        const s = document.getElementById('sign'); s.innerText = m;
        s.style.background = t === 'success' ? '#22c55e' : '#ef4444';
        s.classList.add('active-sign');
        setTimeout(() => s.classList.remove('active-sign'), 2500);
    }

    canvas.addEventListener('touchstart', (e) => { isDrawing = true; path = []; e.preventDefault(); }, {passive: false});
    window.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('touchend', handleEnd);
    init();
</script>
</body>
</html>
