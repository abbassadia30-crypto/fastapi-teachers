<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identity Verification | Institution</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        .icon-wrapper {
            width: 120px; height: 120px; background: #1e293b; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #38bdf8; margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            cursor: pointer; transition: 0.3s;
        }
        .icon-wrapper:active { transform: scale(0.9); }

        .scan-line {
            width: 100%; height: 2px; background: #38bdf8;
            position: absolute; top: 0; left: 0;
            box-shadow: 0 0 10px #38bdf8;
            animation: scan 2s infinite ease-in-out;
        }

        @keyframes scan {
            0% { top: 20%; }
            50% { top: 80%; }
            100% { top: 20%; }
        }

        .status-text { color: #94a3b8; font-size: 14px; margin-top: 15px; letter-spacing: 1px; }
        .backup-link { margin-top: 50px; background: none; border: none; color: #38bdf8; font-weight: 600; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="icon-wrapper" onclick="triggerUnlock()">
    <div style="position: relative; width: 50px; height: 60px; overflow: hidden;">
        <svg viewBox="0 0 24 24" fill="#38bdf8"><path d="M12 1c-4.97 0-9 4.03-9 9 0 .41.34.75.75.75s.75-.34.75-.75c0-4.14 3.36-7.5 7.5-7.5s7.5 3.36 7.5 7.5c0 .71-.11 1.39-.31 2.03-.13.4-.35.83-.22 1.23.13.4.56.62.96.49.29-.09.58-.62.74-1.15.26-.84.4-1.72.4-2.6 0-4.97-4.03-9-9-9zM12 4c-3.31 0-6 2.69-6 6 0 .41.34.75.75.75s.75-.34.75-.75c0-2.48 2.02-4.5 4.5-4.5s4.5 2.02 4.5 4.5c0 1.94-1.24 3.59-2.96 4.19-.38.13-.59.54-.46.92.13.38.54.59.92.46 2.36-.83 4-3.08 4-5.57 0-3.31-2.69-6-6-6z"/></svg>
        <div class="scan-line"></div>
    </div>
</div>

<h2 style="margin: 0; letter-spacing: 1px;">Security Gate</h2>
<p class="status-text" id="status">Touch sensor to unlock</p>

<button class="backup-link" onclick="useBackup()">Use PIN Backup</button>

<script src="js/storage.js"></script>
<script>
    // Extraordinary Feature: Automatically trigger on open
    window.onload = () => {
        setTimeout(triggerUnlock, 500);
    };

    async function triggerUnlock() {
        document.getElementById('status').innerText = "Scanning...";
        try {
            const verified = await Capacitor.Plugins.NativeBiometric.verify({
                reason: "Access Institution Super Console",
                title: "Identity Check",
                subtitle: "Registered Fingerprint Required"
            });

            if (verified) {
                if (window.Capacitor) Capacitor.Plugins.Haptics.notification({ type: 'SUCCESS' });
                sessionStorage.setItem('session_unlocked', 'true');
                window.location.href = "dashboard.html";
            }
        } catch (err) {
            document.getElementById('status').innerText = "Verification Failed";
            if (window.Capacitor) Capacitor.Plugins.Haptics.notification({ type: 'ERROR' });
        }
    }

    function useBackup() {
        // Redirect to your PIN page
        window.location.href = "pin-lock.html";
    }
</script>
</body>
</html>
