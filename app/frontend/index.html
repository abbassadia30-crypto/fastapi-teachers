<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Institution Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Institution Custom Styles */
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        #notification-bar { 
            position: fixed; 
            top: -100px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 350px; 
            padding: 15px; 
            border-radius: 15px; 
            color: white; 
            font-weight: 600; 
            text-align: center; 
            transition: 0.4s; 
            z-index: 1000; 
        }

        /* Red and Green Sign Boxes */
        .bg-red { background: #e53935; border: 1px solid #b71c1c; }
        .bg-green { background: #43a047; border: 1px solid #1b5e20; }

        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 85%; 
            max-width: 350px; 
            text-align: center; 
        }

        .input-group { margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid #eee; 
            background: #f9f9f9; 
            box-sizing: border-box; 
            outline: none; 
            font-family: 'Poppins', sans-serif;
        }

        .btn { 
            width: 100%; 
            padding: 15px; 
            background: #0288d1; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .btn:hover { background: #0277bd; }
        #signup{font-size:12px; margin-top:15px;}
    </style>
</head>
<body>

    <div id="notification-bar"></div>

    <div class="card">
        <h2>Institution Login</h2>
        <div class="input-group"><input type="email" id="email" placeholder="Email"></div>
        <div class="input-group"><input type="password" id="password" placeholder="Password"></div>
        <button class="btn" onclick="handleLogin()">Login</button>
        <p id="signup">New? <a href="signup.html">Create Account</a></p>
    </div>

    <script>
        const API_BASE = "https://fastapi-teachers.onrender.com";

        // If already logged in, skip to dashboard
        if (localStorage.getItem('adminEmail')) {
            window.location.href = "dashboard.html";
        }

        function showBar(msg, type) {
            const bar = document.getElementById('notification-bar');
            bar.innerText = msg;
            bar.className = type === 'error' ? 'bg-red' : 'bg-green';
            bar.style.top = "20px";
            setTimeout(() => bar.style.top = "-100px", 3000);
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showBar("Enter email and password", "error");
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });

                const result = await response.json();

                if(response.ok) {
                    // CRITICAL: Save as adminEmail to match Dashboard/Admission logic
                    localStorage.setItem('adminEmail', email);
                    
                    showBar("Welcome Back!", "success");
                    // Navigating to dashboard after success
                    setTimeout(() => window.location.href = "dashboard.html", 1000);
                } else {
                    showBar(result.detail || "Invalid Credentials", "error");
                }
            } catch(e) {
                showBar("Server Offline - Check Connection", "error");
            }
        }
    </script>
</body>
</html>
