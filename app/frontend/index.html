<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Institution Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #notification-bar { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 350px; padding: 15px; border-radius: 15px; color: white; font-weight: 600; text-align: center; transition: 0.4s; z-index: 1000; }
        .bg-red { background: #e53935; }
        .bg-green { background: #43a047; }
        .card { background: white; padding: 40px 30px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 85%; max-width: 350px; text-align: center; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #eee; background: #f9f9f9; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; background: #0288d1; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div id="notification-bar"></div>
    <div class="card">
        <h2>Institution Login</h2>
        <div class="input-group"><input type="email" id="email" placeholder="Email"></div>
        <div class="input-group"><input type="password" id="password" placeholder="Password"></div>
        <button class="btn" onclick="handleLogin()">Login</button>
        <p style="font-size:12px; margin-top:15px;">New? <a href="signup.html">Create Account</a></p>
    </div>

    <script>
        // REDIRECT CHECK: If already logged in, skip this page
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = "who-is-it.html";
        }

        // Replace the old local IP with your new Render URL
         // Update this line at the top of your <script>
        const API_BASE = "https://fastapi-teachers.onrender.com";

        function showBar(msg, type) {
            const bar = document.getElementById('notification-bar');
            bar.innerText = msg;
            bar.className = type === 'error' ? 'bg-red' : 'bg-green';
            bar.style.top = "20px";
            setTimeout(() => bar.style.top = "-100px", 3000);
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });

                if(response.ok) {
                    // Save login state permanently
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('user_email', email);
                    
                    showBar("Welcome Back!", "success");
                    setTimeout(() => window.location.href = "who-is-it.html", 1000);
                } else {
                    showBar("Invalid Credentials", "error");
                }
            } catch(e) {
                showBar("Server Offline", "error");
            }
        }
    </script>
</body>
</html>
