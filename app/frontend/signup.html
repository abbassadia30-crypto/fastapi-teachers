<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Institution Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        #notification-bar { 
            position: fixed; 
            top: -100px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 350px; 
            padding: 15px; 
            border-radius: 15px; 
            color: white; 
            font-weight: 600; 
            text-align: center; 
            transition: 0.4s; 
            z-index: 1000; 
        }

        /* Red and Green Sign Boxes */
        .bg-red { background: #e53935; border: 1px solid #b71c1c; }
        .bg-green { background: #43a047; border: 1px solid #1b5e20; }

        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 85%; 
            max-width: 380px; 
            text-align: center; 
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 12px; font-weight: 600; color: #666; margin-left: 5px; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid #eee; 
            background: #f9f9f9; 
            box-sizing: border-box; 
            outline: none; 
            font-family: 'Poppins', sans-serif;
            margin-top: 5px;
        }

        .btn { 
            width: 100%; 
            padding: 15px; 
            background: #0288d1; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn:hover { background: #0277bd; }
        
        .footer-text { font-size: 12px; margin-top: 20px; color: #777; }
        .footer-text a { color: #0288d1; text-decoration: none; font-weight: 600; }
        #AF{color: #888; font-size: 13px; margin-bottom: 25px;}
    </style>
</head>
<body>

    <div id="notification-bar"></div>

    <div class="card">
        <h2>Join Institution</h2>
        <p id="AF">Create your admin profile</p>
        
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="John Doe">
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="admin@institution.com">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn" onclick="handleSignup()">Create Account</button>
        
        <p class="footer-text">Already have an account? <a href="index.html">Login</a></p>
    </div>

<script>
    const API_BASE = "https://fastapi-teachers.onrender.com";

    function showBar(msg, type) {
        const bar = document.getElementById('notification-bar');
        bar.innerText = msg;
        bar.className = type === 'error' ? 'bg-red' : 'bg-green';
        bar.style.top = "20px";
        setTimeout(() => bar.style.top = "-100px", 3000);
    }

    async function handleSignup() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!name || !email || !password) {
            showBar("All fields are required", "error");
            return;
        }

        const signupData = { name, email, password };

        try {
            const response = await fetch(`${API_BASE}/users`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(signupData)
            });

            const result = await response.json();

            if (response.ok) {
                // 1. Save data for the next page
                localStorage.setItem("pending_email", email);

                // 2. Show the message first
                showBar("Account Created! Redirecting to verification...", "success");

                // 3. Wait 2 seconds before redirecting
                setTimeout(() => {
                    window.location.href = "verify.html";
                }, 2000); 
            } else {
                showBar(result.detail || "Signup failed", "error");
            }
        } catch (error) {
            // This is the 'catch' block that was missing!
            console.error("Signup Error:", error);
            showBar("Server connection failed. Try again later.", "error");
        }
    }
</script>
 </body>
</html>
