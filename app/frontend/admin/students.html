<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institution Student Directory</title>
    <style>
        /* Institution Style Sheet */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        h2 { color: #2c3e50; text-align: center; }
        
        /* Search Bar Style */
        .search-container { margin: 20px 0; text-align: center; }
        #searchInput { 
            padding: 12px; 
            width: 80%; 
            max-width: 400px; 
            border-radius: 25px; 
            border: 1px solid #ccc; 
            outline: none;
        }

        /* Status Sign Box */
        #status-container { margin-bottom: 20px; }
        .sign-box { padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; display: none; }
        .green-sign { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .red-sign { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }

        /* Card Grid Layout */
        .directory-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }

        /* Individual Student Card */
        .student-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 5px solid #3498db;
            transition: transform 0.2s;
        }
        .student-card:hover { transform: translateY(-5px); }
        .student-card h3 { margin: 0 0 10px 0; color: #2980b9; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .student-card p { margin: 5px 0; font-size: 0.9em; color: #555; }
        .label { font-weight: bold; color: #333; }
        .tag { display: inline-block; background: #e1f5fe; color: #0288d1; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Institution Student Directory</h2>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search by name or CNIC...">
    </div>

    <div id="status-container">
        <div id="status-box" class="sign-box"></div>
    </div>

    <div id="student-list" class="directory-grid"></div>
</div>

<script>
    const API_BASE = "https://fastapi-teachers.onrender.com";

    // Get the logged-in admin email
    const adminEmail = localStorage.getItem("adminEmail");

    async function fetchStudents() {
        const statusBox = document.getElementById('status-box');
        const listContainer = document.getElementById('student-list');

        // Security Check
        if (!adminEmail) {
            statusBox.className = "sign-box red-sign";
            statusBox.innerText = "Access Denied: No logged-in admin found.";
            return;
        }

        try {
            // Updated fetch to include admin_email query parameter
            const response = await fetch(`${API_BASE}/students?admin_email=${adminEmail}`);
            if (!response.ok) throw new Error("Could not retrieve your records.");
            
            const students = await response.json();

            if (students.length === 0) {
                statusBox.className = "sign-box red-sign";
                statusBox.innerText = "You haven't registered any students in the institution yet.";
                return;
            }

            statusBox.className = "sign-box green-sign";
            statusBox.innerText = `Successfully loaded ${students.length} students for ${adminEmail}.`;

            listContainer.innerHTML = students.map(student => `
                <div class="student-card">
                    <h3>${student.student_name}</h3>
                    <p><span class="label">Father:</span> ${student.father_name}</p>
                    <p><span class="label">CNIC:</span> ${student.father_cnic}</p>
                    <p><span class="label">Phone:</span> ${student.phone}</p>
                    <p><span class="label">ID:</span> ${student.unique_id || 'N/A'}</p>
                    <div class="tag">Grade: ${student.grade}</div>
                </div>
            `).join('');

        } catch (error) {
            statusBox.className = "sign-box red-sign";
            statusBox.innerText = "Error connecting to institution backend: " + error.message;
        }
    }

    // Live Search Logic
    document.getElementById('searchInput').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        const cards = document.querySelectorAll('.student-card');
        cards.forEach(card => {
            const content = card.innerText.toLowerCase();
            card.style.display = content.includes(term) ? "block" : "none";
        });
    });

    fetchStudents();
</script>

</body>
</html>
