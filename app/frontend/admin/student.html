<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Admission - Institution Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #e3f2fd, #fce4ec);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #notification-bar {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            text-align: center;
            transition: 0.4s ease-in-out;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .bg-red { background: #ef5350; border: 1px solid #d32f2f; }
        .bg-green { background: #66bb6a; border: 1px solid #388e3c; }

        .form-card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 { color: #0277bd; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        
        label { 
            display: block; 
            font-size: 13px; 
            font-weight: 600; 
            color: #555; 
            margin-bottom: 6px; 
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #fdfdfd;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        input:focus, select:focus { border-color: #0288d1; }

        #other-grade-group { display: none; margin-top: 10px; }

        .btn-container { display: flex; gap: 12px; margin-top: 25px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-submit { background: #29b6f6; }
        .btn-back { background: #90a4ae; }
    </style>
</head>
<body>

    <div id="notification-bar"></div>

    <div class="form-card">
        <h2>Student Admission</h2>
        
        <div class="input-group">
            <label for="unique_id">Unique ID (Optional)</label>
            <input type="text" id="unique_id" placeholder="e.g. INST-101">
        </div>

        <div class="input-group">
            <label for="student_name">Student Full Name</label>
            <input type="text" id="student_name" placeholder="Name">
        </div>

        <div class="input-group">
            <label for="father_name">Father's Name</label>
            <input type="text" id="father_name" placeholder="Father Name">
        </div>

        <div class="input-group">
            <label for="father_cnic">Father's CNIC</label>
            <input type="text" id="father_cnic" placeholder="3660xxxxxxxx">
        </div>

        <div class="input-group">
            <label for="phone">Phone / Contact</label>
            <input type="tel" id="phone" placeholder="03XXXXXXXXX">
        </div>

        <div class="input-group">
            <label for="fees">Monthly Tuition Fee</label>
            <input type="number" id="fees" placeholder="e.g. 2500">
        </div>

        <div class="input-group">
            <label for="grade">Grade / Class</label>
            <select id="grade" onchange="checkGrade(this.value)">
                <option value="">Select Grade</option>
                <option value="Pre">Pre</option>
                <option value="1">Grade 1</option>
                <option value="2">Grade 2</option>
                <option value="2">Grade 3</option>
                <option value="2">Grade 4</option>
                <option value="2">Grade 5</option>
                <option value="2">Grade 6</option>
                <option value="2">Grade 7</option>
                <option value="2">Grade 8</option>
                <option value="2">Grade 9</option>
                <option value="2">Grade 10</option>
                <option value="2">Grade 11</option>
                <option value="2">Grade 12</option>
                <option value="Other">Other</option>
            </select>
            
            <div id="other-grade-group">
                <input type="text" id="other_grade_name" placeholder="Enter custom grade name">
            </div>
        </div>

        <div class="btn-container">
            <button class="btn btn-back" onclick="window.history.back()">Back</button>
            <button class="btn btn-submit" onclick="submitAdmission()">Register Student</button>
        </div>
    </div>

<script>
    const API_BASE = "https://fastapi-teachers.onrender.com";

    const adminEmail = localStorage.getItem("adminEmail");
    if (!adminEmail) {
        window.location.href = "login.html";
    }

    function checkGrade(val) {
        const otherGroup = document.getElementById('other-grade-group');
        otherGroup.style.display = (val === 'Other') ? 'block' : 'none';
    }

    function showBar(msg, type) {
        const bar = document.getElementById('notification-bar');
        bar.innerText = msg;
        bar.className = type === 'error' ? 'bg-red' : 'bg-green';
        bar.style.top = "20px";
        setTimeout(() => bar.style.top = "-100px", 4000);
    }

    async function submitAdmission() {
        const studentName = document.getElementById('student_name').value.trim();
        const fatherName = document.getElementById('father_name').value.trim();
        const fatherCnic = document.getElementById('father_cnic').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const fees = document.getElementById('fees').value.trim();
        const uniqueId = document.getElementById('unique_id').value.trim();
        let grade = document.getElementById('grade').value;

        if (grade === 'Other') {
            grade = document.getElementById('other_grade_name').value.trim();
        }

        if (!studentName || !fatherName || !phone || !grade || !fees) {
            showBar("Please fill all required fields, including fees.", "error");
            return;
        }

        const admissionData = {
            unique_id: uniqueId || null,
            student_name: studentName,
            father_name: fatherName,
            father_cnic: fatherCnic || null,
            phone: phone,
            grade: grade,
            fees: parseInt(fees) // Sending fees as an integer
        };

        try {
            const response = await fetch(`${API_BASE}/students?admin_email=${adminEmail}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(admissionData)
            });

            if (response.ok) {
                showBar("Student Registered Successfully!", "success");
                document.querySelectorAll('input').forEach(i => i.value = '');
                document.getElementById('grade').value = '';
            } else {
                const result = await response.json();
                showBar(result.detail || "Registration Failed", "error");
            }
        } catch (error) {
            showBar("Server Connection Failed", "error");
        }
    }
</script>
</body>
</html>
